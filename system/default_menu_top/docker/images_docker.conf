enabled=1
label=Images Docker
icon=🖼️
match=/docker/images
item_001=🧹|Images inutilisées|#|dockerOpenDeleteUnusedImages(); return false;
item_002=🧱|Cache build|#|dockerOpenMaintenance('prune_build_cache', 'Supprimer le cache de build Docker ?', 'Supprime le cache BuildKit / buildx. Les conteneurs et images utilisées ne sont pas touchés.'); return false;
item_003=⏹|Conteneurs arrêtés|#|dockerOpenMaintenance('prune_stopped_containers', 'Supprimer les conteneurs arrêtés ?', 'Supprime uniquement les conteneurs Docker arrêtés.'); return false;
item_004=🏷|Images dangling|#|dockerOpenMaintenance('prune_dangling_images', 'Supprimer les images dangling ?', 'Supprime les images sans tag créées après des rebuilds.'); return false;
item_005=🌐|Réseaux inutilisés|#|dockerOpenMaintenance('prune_unused_networks', 'Supprimer les réseaux inutilisés ?', 'Supprime les réseaux Docker qui ne sont utilisés par aucun conteneur.'); return false;
item_006=📦|Volumes inutilisés|#|dockerOpenMaintenance('prune_unused_volumes', 'Supprimer les volumes inutilisés ?', 'Attention : supprime les volumes Docker non attachés à un conteneur.'); return false;
item_007=✨|Nettoyage léger|#|dockerOpenMaintenance('prune_system_safe', 'Lancer un nettoyage léger Docker ?', 'Nettoie conteneurs arrêtés, réseaux inutilisés, images dangling et cache build. Les volumes ne sont pas supprimés.'); return false;
item_008=🔥|Grand nettoyage|#|dockerOpenMaintenance('prune_system_deep', 'Lancer le grand nettoyage Docker ?', 'Action forte : supprime conteneurs arrêtés, réseaux inutilisés, images inutilisées, volumes inutilisés et cache build.'); return false;
