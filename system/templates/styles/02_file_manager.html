    /* ------------------------------------------------------------------
       Gestionnaire de fichiers
       CSS centralisé : le template file.html ne contient pas de <style>.
       ------------------------------------------------------------------ */


    /* Barre de raccourcis du gestionnaire de fichiers : plus compacte
       pour éviter de pousser le titre sous le bandeau général. */
    body:has(.fm-page) .yoleo-page-title p {
        margin-top: 1px;
    }

    body:has(.fm-page) .fm-topbar-shortcuts {
        gap: 4px;
        font-size: 10px;
        line-height: 1.08;
    }

    body:has(.fm-page) .fm-topbar-shortcuts kbd {
        min-width: 18px;
        padding: 1px 4px;
        border-radius: 5px;
        font-size: 9px;
        line-height: 1.05;
    }

    @media (min-width: 901px) {
        html:has(.fm-page),
        body:has(.fm-page) {
            overflow-y: hidden;
        }

        body:has(.fm-page) .yoleo-shell,
        body:has(.fm-page) .yoleo-main {
            height: 100vh;
            min-height: 0;
            overflow: hidden;
        }

        body:has(.fm-page) .yoleo-content {
            min-height: 0;
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body:has(.fm-page) .fm-page {
            height: auto;
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }
    }

    .fm-page {
        height: calc(100vh - 55px);
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        overflow: hidden;
    }


    .fm-container {
        --left-pane: 50%;
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        gap: 0;
        color: var(--yoleo-text);
        font-family: "Segoe UI", Consolas, monospace;
    }

    .fm-panel {
        flex: 1 1 0;
        min-width: 230px;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
        border: 1px solid var(--yoleo-border);
        border-radius: var(--yoleo-radius);
        background: rgba(18, 26, 36, .88);
        box-shadow: 0 12px 32px rgba(0, 0, 0, .18);
        transition: border-color .16s ease, background-color .16s ease, box-shadow .16s ease;
    }

    #panel-left {
        flex: 0 0 var(--left-pane, 50%);
    }

    #panel-right {
        flex: 1 1 0;
    }

    .fm-panel.is-active-panel {
        border-color: var(--yoleo-accent-2);
        box-shadow: 0 0 0 1px rgba(26, 235, 255, .18), 0 14px 34px rgba(0, 0, 0, .20);
    }

    .fm-panel.drag-active {
        border-color: var(--yoleo-accent-2);
        background: rgba(27, 39, 52, .92);
        box-shadow: 0 0 0 1px rgba(26, 235, 255, .14), 0 0 18px rgba(26, 235, 255, .08);
    }

    .fm-panel-title {
        flex: 0 0 auto;
        min-height: 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--yoleo-border-soft);
        background: rgba(10, 15, 22, .52);
        color: #dce8f5;
        font-weight: 800;
        font-size: 12px;
        letter-spacing: .02em;
        text-transform: uppercase;
    }

    .fm-panel-title small {
        color: var(--yoleo-muted);
        font-weight: 700;
        text-transform: none;
        letter-spacing: 0;
    }

    .fm-resizer {
        flex: 0 0 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: col-resize;
        user-select: none;
        touch-action: none;
        color: #64748b;
    }

    .fm-resizer::before {
        content: "⋮";
        width: 8px;
        min-height: 82px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid var(--yoleo-border);
        background: rgba(10, 15, 22, .85);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, .25);
        font-size: 22px;
        line-height: 1;
    }

    .fm-resizer:hover::before,
    .fm-resizing .fm-resizer::before {
        color: #fff;
        border-color: var(--yoleo-accent-2);
        background: linear-gradient(180deg, rgba(139, 92, 246, .95), rgba(26, 235, 255, .45));
        box-shadow: 0 0 14px rgba(26, 235, 255, .25);
    }

    .fm-resizing,
    .fm-resizing * {
        cursor: col-resize !important;
        user-select: none !important;
    }

    .fm-addr {
        flex: 0 0 auto;
        display: flex;
        gap: 6px;
        padding: 8px;
        border-bottom: 1px solid var(--yoleo-border-soft);
        background: rgba(10, 15, 22, .72);
    }

    .fm-addr input {
        flex: 1 1 auto;
        min-width: 0;
        padding: 7px 9px;
        border: 1px solid var(--yoleo-border);
        border-radius: 10px;
        outline: none;
        background: rgba(4, 7, 11, .92);
        color: var(--yoleo-accent-2);
        font-family: Consolas, "Courier New", monospace;
        font-size: 13px;
    }

    .fm-addr input:focus {
        border-color: var(--yoleo-accent);
        box-shadow: 0 0 0 2px rgba(139, 92, 246, .24);
        background: #05070a;
    }

    .fm-addr input.path-error {
        border-color: var(--yoleo-danger);
        color: #ffb4b4;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, .25);
    }

    .fm-list {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        cursor: default;
        scrollbar-width: thin;
        scrollbar-color: #344963 transparent;
    }

    .fm-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
    }

    .fm-table th {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 8px 6px;
        border-bottom: 1px solid var(--yoleo-border-soft);
        background: #1c2633;
        color: #9fdfff;
        text-align: left;
        user-select: none;
        text-transform: uppercase;
        letter-spacing: .03em;
        font-size: 11px;
    }

    .fm-table td {
        padding: 8px 6px;
        border-bottom: 1px solid rgba(255, 255, 255, .05);
        white-space: nowrap;
        cursor: default;
        user-select: none;
    }

    .fm-row:hover {
        background: rgba(255, 255, 255, .035);
    }

    .fm-row.selected {
        background: linear-gradient(90deg, rgba(139, 92, 246, .95), rgba(126, 34, 206, .82)) !important;
        color: #fff !important;
        box-shadow: inset 4px 0 0 #d8b4fe, 0 0 0 1px rgba(216, 180, 254, .28);
    }

    .fm-row.selected:hover {
        background: linear-gradient(90deg, rgba(147, 51, 234, 1), rgba(109, 40, 217, .92)) !important;
    }

    .fm-row.selected td,
    .fm-row.selected span,
    .fm-row.selected .is-dir,
    .fm-row.selected .is-file {
        color: #fff !important;
    }

    .fm-name-cell {
        cursor: pointer;
        touch-action: manipulation;
    }

    .is-dir {
        color: #ffcc66;
        font-weight: 800;
    }

    .is-file {
        color: #dbe5ef;
    }

    .fm-perms-cell {
        color: #9bb0c2;
        font-family: Consolas, "Courier New", monospace;
    }

    .fm-owner-cell {
        color: #b8c6d6;
        font-size: 11px;
    }

    .fm-toolbar {
        flex: 0 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 9px;
        padding: 10px;
        border: 1px solid var(--yoleo-border-soft);
        border-radius: var(--yoleo-radius);
        background: rgba(18, 26, 36, .82);
    }

    .fm-toolbar-spacer {
        width: 14px;
        height: 1px;
    }

    .btn-fm {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 34px;
        padding: 8px 13px;
        border: 1px solid #39485d;
        border-radius: 10px;
        background: #263242;
        color: var(--yoleo-text);
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        text-decoration: none;
        transition: background .15s ease, border-color .15s ease, color .15s ease, transform .12s ease;
    }

    .btn-fm:hover:not(:disabled) {
        border-color: var(--yoleo-accent-2);
        background: var(--yoleo-accent-2);
        color: #000;
    }

    .btn-fm:disabled {
        opacity: .65;
        cursor: not-allowed;
    }

    .btn-danger,

    .btn-danger:hover:not(:disabled),
    .btn-red:hover:not(:disabled) {
        border-color: #f44336;
        background: #f44336;
        color: #fff;
    }

    .btn-copy {
        border-color: rgba(72, 213, 151, .55);
        background: rgba(72, 213, 151, .18);
        color: #dbfff0;
    }

    .btn-move {
        border-color: rgba(255, 181, 92, .55);
        background: rgba(255, 181, 92, .18);
        color: #ffe8c6;
    }

    .btn-stop {
        border-color: rgba(255, 93, 115, .55);
        background: rgba(255, 93, 115, .14);
        color: #ffd9df;
    }

    .mobile-tabs {
        display: none;
        flex: 0 0 auto;
        gap: 8px;
    }

    .mob-tab {
        flex: 1 1 auto;
        padding: 11px;
        border: 1px solid var(--yoleo-border);
        border-radius: 10px;
        background: rgba(17, 24, 34, .88);
        color: #8b9aac;
        cursor: pointer;
        font-weight: 800;
        font: inherit;
    }

    .mob-tab.active {
        border-color: var(--yoleo-accent-2);
        background: rgba(21, 28, 39, .94);
        color: var(--yoleo-accent-2);
    }

    .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(0, 0, 0, .82);
        backdrop-filter: blur(3px);
    }

    .modal-box {
        width: min(92vw, 430px);
        max-height: 92vh;
        overflow: hidden;
        border: 1px solid var(--yoleo-border);
        border-radius: 16px;
        background: var(--yoleo-panel);
        box-shadow: 0 24px 70px rgba(0, 0, 0, .62);
        animation: fm-popin .16s ease-out;
    }

    @keyframes fm-popin {
        from { transform: scale(.96); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    .modal-header,
    .fm-modal-bar {
        min-height: 50px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 15px;
        border-bottom: 1px solid var(--yoleo-border-soft);
        background: rgba(17, 24, 34, .88);
        color: var(--yoleo-accent-2);
        font-weight: 900;
    }

    .modal-close {
        width: 32px;
        height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: var(--yoleo-text);
        cursor: pointer;
        font-size: 16px;
    }

    .modal-close:hover {
        border-color: var(--yoleo-border);
        background: rgba(255, 255, 255, .06);
    }

    .modal-body {
        padding: 18px;
        color: #d5dfeb;
        font-size: 13px;
        line-height: 1.42;
        overflow: auto;
        max-height: 65vh;
    }

    .modal-footer,
    #editor-footer,
    #exec-footer {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        padding: 12px 15px;
        border-top: 1px solid var(--yoleo-border-soft);
        background: rgba(17, 24, 34, .88);
    }

    .inp-mod,
    .sel-mod {
        width: 100%;
        margin: 5px 0 15px;
        padding: 10px;
        border: 1px solid var(--yoleo-border);
        border-radius: 10px;
        background: rgba(4, 7, 11, .92);
        color: #fff;
        font: inherit;
    }

    .lbl-mod {
        display: block;
        color: #8fa2b7;
        font-size: 12px;
        font-weight: 800;
    }

    .chk-mod {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 2px 0 15px;
        padding: 10px;
        border: 1px solid var(--yoleo-border);
        border-radius: 10px;
        background: #10161f;
        color: #d5dfeb;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
    }

    .chk-mod input {
        width: 16px;
        height: 16px;
        accent-color: var(--yoleo-accent-2);
    }

    /* La fenêtre Propriétaire contient déjà le chemin de l'élément : ses
       champs sont volontairement plus compacts pour que la coche récursive
       reste visible, même sur un petit écran. */
    .fm-owner-form .lbl-mod {
        line-height: 1.2;
    }

    .fm-owner-fields {
        display: grid;
        grid-template-columns: minmax(120px, 32%) minmax(58px, 10%);
        justify-content: start;
        align-items: start;
        gap: 10px;
    }

    .fm-owner-fields .lbl-mod {
        min-width: 0;
    }

    .fm-owner-form .inp-mod,
    .fm-owner-form .sel-mod {
        margin: 2px 0 7px;
        padding: 7px 10px;
    }

    .fm-owner-form .chk-mod {
        margin: 0 0 4px;
        padding: 7px 8px;
        line-height: 1.25;
    }

    .confirm-path-title {
        margin: 12px 0 8px;
        color: #c4b5fd;
        font-weight: 800;
    }

    .confirm-path-list {
        max-height: 190px;
        overflow: auto;
        margin-top: 8px;
        padding: 8px;
        border: 1px solid #5b21b6;
        border-radius: 10px;
        background: #0b0f16;
    }

    .confirm-path {
        margin: 6px 0;
        padding: 8px 10px;
        border-left: 3px solid #a78bfa;
        border-radius: 7px;
        background: rgba(139, 92, 246, .18);
        color: #fff;
        font-family: Consolas, monospace;
        font-size: 12px;
        line-height: 1.35;
        white-space: normal;
        word-break: break-all;
    }

    .confirm-more {
        padding: 6px 2px 0;
        color: #cbd5e1;
        font-size: 12px;
    }

    .danger-note,
    .danger-count {
        color: #ffb4b4;
        font-weight: 900;
    }

    .fm-selection-hint {
        margin-bottom: 12px;
        padding: 9px 10px;
        border: 1px solid #3b2f57;
        border-radius: 10px;
        background: #0b0f16;
        color: #d5dfeb;
        font-size: 12px;
    }

    .fm-selection-name,
    .fm-code-accent {
        color: #c4b5fd;
        font-family: Consolas, monospace;
    }

    .fm-selection-path,
    .fm-error-path {
        color: #8fa2b7;
        font-family: Consolas, monospace;
        word-break: break-all;
    }

    .fm-error-path {
        color: #ffb4b4;
    }

    .fm-selection-warning {
        color: #ffcc66;
    }

    .fm-perm-grid,
    .fm-drag-actions {
        display: flex;
        gap: 8px;
    }

    .fm-perm-column {
        flex: 1 1 0;
    }

    .fm-current-perms {
        margin-bottom: 10px;
        color: #d5dfeb;
    }

    /* Permissions : une ligne compacte sur PC, sans ascenseur artificiel. */
    .fm-permissions-form {
        display: flex;
        align-items: flex-end;
        gap: 10px;
    }

    .fm-permissions-form .fm-current-perms {
        flex: 0 0 auto;
        margin: 0 0 7px;
        white-space: nowrap;
        font-size: 12px;
    }

    .fm-permissions-form .fm-perm-grid {
        flex: 0 1 225px;
        min-width: 0;
        gap: 6px;
    }

    .fm-permissions-form .fm-perm-column {
        min-width: 0;
    }

    .fm-permissions-form .sel-mod {
        margin: 2px 0 6px;
        padding: 6px 8px;
    }

    .fm-perm-recursive {
        margin: 0 0 4px;
        padding: 7px 8px;
        line-height: 1.25;
    }

    .fm-drag-summary {
        margin-bottom: 20px;
        color: #d5dfeb;
        text-align: center;
    }

    .fm-drag-dest {
        color: #f1c40f;
        font-family: Consolas, monospace;
        word-break: break-all;
    }

    #ctx-menu {
        position: fixed;
        z-index: 5000;
        display: none;
        min-width: 190px;
        max-height: calc(100dvh - 20px);
        overflow-y: auto;
        padding: 5px 0;
        border: 1px solid #39485d;
        border-radius: 12px;
        background: var(--yoleo-panel);
        box-shadow: 2px 2px 18px rgba(0, 0, 0, .78);
    }

    .ctx-item {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 14px;
        border: 0;
        background: transparent;
        color: #dbe5ef;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        text-align: left;
    }

    .ctx-item:hover,
    .ctx-item:focus-visible {
        outline: none;
        background: linear-gradient(90deg, rgba(139, 92, 246, .95), rgba(126, 34, 206, .82));
        color: #fff;
        box-shadow: inset 4px 0 0 #d8b4fe, 0 0 0 1px rgba(216, 180, 254, .28);
    }

    .ctx-danger:hover,
    .ctx-danger:focus-visible {
        background: linear-gradient(90deg, rgba(239, 68, 68, .95), rgba(153, 27, 27, .82));
        box-shadow: inset 4px 0 0 #fecaca, 0 0 0 1px rgba(254, 202, 202, .22);
    }

    .ctx-sep {
        height: 1px;
        margin: 4px 0;
        background: #39485d;
    }

    .ctx-disabled {
        opacity: .48;
        pointer-events: none;
    }

    #editor-box,
    #exec-box {
        width: min(96vw, 1100px);
        height: min(84vh, 820px);
        display: flex;
        flex-direction: column;
        padding: 0;
    }

    #editor-area {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        padding: 15px;
        border: 0;
        outline: none;
        resize: none;
        background: #080b10;
        color: #e0e0e0;
        font-family: Consolas, "Courier New", monospace;
        font-size: 14px;
        line-height: 1.42;
    }

    #exec-meta {
        padding: 10px 14px;
        border-bottom: 1px solid var(--yoleo-border-soft);
        background: rgba(10, 15, 22, .68);
        color: #d5dfeb;
        font-size: 12px;
        font-family: Consolas, monospace;
        word-break: break-all;
    }

    #exec-log {
        flex: 1 1 auto;
        min-height: 0;
        margin: 0;
        overflow: auto;
        padding: 14px;
        background: #05070a;
        color: #dce8f5;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
    }

    @media (max-width: 900px) {
        .fm-page {
            min-height: calc(100vh - 55px);
            height: auto;
            padding: 8px;
            padding-bottom: 8px;
            overflow: visible;
        }


        .mobile-tabs {
            display: flex;
        }

        .fm-container {
            display: block;
            min-height: calc(100vh - 180px);
        }

        .fm-panel {
            display: none;
            height: calc(100vh - 180px);
            min-width: 0;
        }

        #panel-left,
        #panel-right {
            width: auto;
            flex: none;
        }

        .fm-panel.mobile-show {
            display: flex;
        }

        .fm-resizer {
            display: none;
        }

        .fm-toolbar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 880;
            border-radius: 0;
            border-left: 0;
            border-right: 0;
            border-bottom: 0;
            gap: 5px;
            padding: 7px;
        }

        .fm-toolbar-spacer {
            display: none;
        }

        .btn-fm {
            flex: 1 1 30%;
            min-height: 42px;
            padding: 9px 5px;
            font-size: 11px;
        }

        .fm-table {
            font-size: 12px;
        }

        .fm-table th:nth-child(3),
        .fm-table td:nth-child(3),
        .fm-table th:nth-child(4),
        .fm-table td:nth-child(4) {
            display: none;
        }

        .modal-overlay {
            padding: 10px;
        }

        .modal-box {
            width: 96vw;
        }

        .fm-drag-actions,
        .fm-perm-grid {
            flex-direction: column;
        }

        .fm-permissions-form {
            flex-direction: column;
            align-items: stretch;
            gap: 0;
        }

        .fm-permissions-form .fm-current-perms {
            margin-bottom: 8px;
        }

        .fm-permissions-form .fm-perm-grid {
            flex: 1 1 auto;
        }
    }
