<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - Yoleo</title>
    <link rel="icon" href="/static/logo.png">
    <style>
        :root {
            color-scheme: dark;
            --bg: #080b10;
            --panel: #111821;
            --panel-2: #162231;
            --text: #edf4ff;
            --muted: #96a6b8;
            --line: rgba(148, 163, 184, .22);
            --accent: #2f8cff;
            --accent-2: #8ed7ff;
            --danger: #ff7a8a;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            height: 100vh;
            height: 100dvh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(47, 140, 255, .18), transparent 30%),
                linear-gradient(135deg, #07090d 0%, #0e1721 52%, #08111c 100%);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .login-shell {
            width: min(420px, 100%);
            min-width: 0;
            max-height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        .login-panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(17, 24, 33, .96), rgba(13, 19, 28, .96));
            box-shadow: 0 24px 80px rgba(0, 0, 0, .36);
            padding: 28px;
        }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .login-brand img {
            width: 52px;
            height: 52px;
            object-fit: contain;
        }

        .login-brand h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 760;
            letter-spacing: 0;
        }

        .login-brand p {
            margin: 3px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .field {
            display: grid;
            gap: 8px;
            margin-top: 16px;
        }

        label {
            color: #c8d5e4;
            font-size: 13px;
            font-weight: 680;
        }

        input {
            width: 100%;
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--panel-2);
            color: var(--text);
            padding: 10px 12px;
            font: inherit;
            outline: none;
        }

        input:focus {
            border-color: rgba(47, 140, 255, .8);
            box-shadow: 0 0 0 3px rgba(47, 140, 255, .18);
        }

        .error {
            margin: 0 0 16px;
            border: 1px solid rgba(255, 122, 138, .38);
            border-radius: 6px;
            background: rgba(255, 122, 138, .1);
            color: var(--danger);
            padding: 10px 12px;
            font-size: 14px;
        }

        button {
            width: 100%;
            min-height: 44px;
            margin-top: 22px;
            border: 0;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #06111f;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
        }

        button:hover {
            filter: brightness(1.05);
        }

        .login-foot {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 12px;
            text-align: center;
        }

        @media (max-width: 760px) {
            body {
                padding: 14px;
                place-items: center stretch;
            }

            .login-shell {
                width: 100%;
                max-width: none;
            }

            .login-panel {
                width: 100%;
                padding: 22px;
            }

            .login-brand {
                gap: 12px;
                margin-bottom: 20px;
            }

            .login-brand img {
                width: 46px;
                height: 46px;
            }

            .login-brand h1 {
                font-size: 22px;
            }

            .login-brand p {
                font-size: 13px;
            }

            label {
                font-size: 14px;
            }

            input,
            button {
                min-height: 52px;
                font-size: 16px;
            }

            input {
                padding: 13px 14px;
            }
        }

        @media (max-height: 560px) {
            body {
                align-items: start;
                padding-block: 12px;
            }

            .login-panel {
                padding: 18px;
            }

            .login-brand {
                margin-bottom: 14px;
            }

            .field {
                margin-top: 12px;
            }

            button {
                margin-top: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <section class="login-panel" aria-label="Connexion">
            <div class="login-brand">
                <img src="/static/logo.png" alt="">
                <div>
                    <h1>Yoleo</h1>
                    <p>Connexion root Linux PAM</p>
                </div>
            </div>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            <form method="post" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="hidden" name="next" value="{{ next_url }}">

                <div class="field">
                    <label for="username">Utilisateur autorisé</label>
                    <input id="username" name="username" value="root" autocomplete="username" required autofocus>
                </div>

                <div class="field">
                    <label for="password">Mot de passe</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </div>

                <button type="submit">Se connecter</button>
            </form>
            <p class="login-foot">Session {{ session_minutes }} min</p>
        </section>
    </main>
</body>
</html>
