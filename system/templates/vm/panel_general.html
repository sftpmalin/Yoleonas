<div id="tab-general" class="tab-panel {{ 'active' if active_section == 'general' else '' }}">
                <section class="card">
                    <div class="vm-summary-actions">
                        <div class="summary-grid" id="summaryGrid"></div>
                    </div>
                    <div class="table-wrap vm-mobile-list-wrap" data-mobile-mosaic="off" data-yoleo-context-zone="vm-main" oncontextmenu="return yoleoVmContextMenu(event)">
                        <table class="vm-mobile-list-table vm-main-table">
                            <thead>
                                <tr>
                                    <th>État</th><th>VM</th><th>CPU/RAM</th><th style="text-align:right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="vmTableBody">
                                {% if vms and vms|length > 0 %}
                                <tr><td colspan="4" class="empty-state">Chargement de l'inventaire VM...</td></tr>
                                {% else %}
                                <tr><td colspan="4" class="empty-state">Aucune VM détectée.</td></tr>
                                {% endif %}
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
