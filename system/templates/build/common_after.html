        async function runTask(action, name = '', mode = 'normal', useModal = false, button = null, quiet = false) {
            if (useModal) openProgressModal(taskModalTitle(action, name), taskProgressTitle(action));
            else if (!quiet) switchTab('logs');

            lastRunFailedCount = 0;
            runHadError = false;
            stopBackgroundPolling();
            clearMainBuildRowsForRun(action, name);
            setButtonRunning(button);
            clearLog();
            setStatus('Demarrage : ' + [action, name, mode !== 'normal' ? mode : ''].filter(Boolean).join(' / '));
            setProgress(0);

            try {
                const response = await fetch(runStartUrl, {
                    method: 'POST',
                    credentials: 'same-origin',
                    cache: 'no-store',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, name, mode })
                });
                const payload = await response.json().catch(() => ({}));
                if (!response.ok || !payload.ok) {
                    runHadError = true;
                    consumeLines(`HTTP ${response.status} : ${payload.message || 'Erreur lancement'}\n`, useModal);
                    setStatus('Erreur HTTP ' + response.status);
                    setButtonFinished(button, false);
                    document.dispatchEvent(new CustomEvent('build:task-finished', {
                        detail: {action, name: name || '', ok: false, job: null, message: payload.message || 'Erreur lancement'}
                    }));
                    return;
                }
                const job = payload.job || {};
                if (job.already_running) {
                    setStatus('Une tache Build/Registre est deja en cours, reprise du suivi.');
                }
                renderBackgroundJob(job, useModal);
                scheduleBackgroundPolling(action, name, useModal, button);
            } catch (err) {
                runHadError = true;
                consumeLines(`\nException navigateur : ${String((err && (err.message || err)) || 'Erreur inconnue')}\n`, useModal);
                setStatus('Erreur navigateur.');
                setButtonFinished(button, false);
                document.dispatchEvent(new CustomEvent('build:task-finished', {
                    detail: {
                        action,
                        name: name || '',
                        ok: false,
                        job: null,
                        message: String((err && (err.message || err)) || 'Erreur navigateur.')
                    }
                }));
                refreshStatusAfterTask(action, name);
            }
        }

        function filterTable(tableId, query) {
            query = String(query || '').toLowerCase().trim();
            document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
                const haystack = row.dataset.filter || row.textContent.toLowerCase();
                row.style.display = (!query || haystack.includes(query)) ? '' : 'none';
            });
            bindKeyboardRows();
            ensureKeyboardSelection($(tableId));
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
        }

        function updateTarCells(name, tar) {
            const cleanName = cleanDockerName(name);
            if (!cleanName || !tar) return;

            document.querySelectorAll('[data-tar-cell][data-tar-name]').forEach(cell => {
                if (cleanDockerName(cell.dataset.tarName || '') !== cleanName) return;
                const kind = cell.dataset.tarCell || '';
                const exists = Boolean(tar.exists);
                const size = escapeHtml(tar.size_h || '—');
                const mtime = escapeHtml(tar.mtime || '');
                const shaText = tar.sha ? 'oui' : 'non';
                const arches = Array.isArray(tar.arches) && tar.arches.length ? ` · ${escapeHtml(tar.arches.join(', '))}` : '';

                if (!exists) {
                    if (kind === 'registry') {
                        cell.innerHTML = '<span class="badge badge-no">manquant</span>';
                    } else if (isBuildMainPage()) {
                        cell.innerHTML = `<div class="build-main-tar-line"><span class="badge badge-no">pas de TAR</span>${mainRegistryBadgeMarkup(cleanName)}</div>`;
                    } else {
                        cell.innerHTML = '<span class="badge badge-no">pas de TAR</span>';
                    }
                    return;
                }

                if (kind === 'registry') {
                    cell.innerHTML = `<span class="badge badge-ok">${size}</span><div class="name-sub">sha256 : ${shaText}${arches}</div>`;
                } else if (isBuildMainPage()) {
                    cell.innerHTML = `<div class="build-main-tar-line"><span class="badge badge-ok">${size}</span>${mainRegistryBadgeMarkup(cleanName)}</div><div class="name-sub">${mtime}</div><div class="name-sub">sha256 : ${shaText}${arches}</div>`;
                } else {
                    cell.innerHTML = `<span class="badge badge-ok">${size}</span><div class="name-sub">${mtime}</div><div class="name-sub">sha256 : ${shaText}${arches}</div>`;
                }
            });
        }

        function fillDbRow(button) {
            const row = button.closest('tr');
            row.querySelectorAll('input[data-suggest], select[data-suggest]').forEach(field => {
                if (!String(field.value || '').trim()) field.value = field.dataset.suggest || '';
            });
        }
        function clearDbRow(button) {
            const row = button.closest('tr');
            if (!row) return;
            row.querySelectorAll('input[data-suggest]').forEach(input => input.value = '');
            row.querySelectorAll('select[name="db_platforms"]').forEach(select => {
                select.value = '';
            });
            row.querySelectorAll('select[name="db_mode"]').forEach(select => {
                select.value = '';
            });
        }

        function dbRowPayload(row) {
            return {
                name: row.querySelector('input[name="db_name"]')?.value || '',
                registry: row.querySelector('input[name="db_registry"]')?.value || '',
                platforms: row.querySelector('select[name="db_platforms"]')?.value || '',
                mode: row.querySelector('select[name="db_mode"]')?.value || ''
            };
        }

        function setDbRowState(row, ok, message) {
            if (!row) return;
            row.dataset.unsaved = '0';
            const hint = row.querySelector('td:first-child .hint');
            if (hint) {
                hint.innerHTML = `<span class="badge ${ok ? 'badge-ok' : 'badge-no'}">${ok ? 'enregistré' : 'erreur'}</span>`;
                if (message) hint.title = message;
            }
            const data = dbRowPayload(row);
            const modeLabel = String(data.mode) === '1' ? 'https' : 'http';
            row.dataset.dbFilter = `${String(data.name).toLowerCase()} ${String(data.registry).toLowerCase()} ${String(data.platforms).toLowerCase()} ${modeLabel}`;
        }

        async function postDbRows(rows, button) {
            setButtonRunning(button);
            try {
                const response = await fetch(databaseJsonUrl, {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({rows})
                });
                const payload = await response.json().catch(() => ({}));
                if (!response.ok || !payload.ok) throw new Error(payload.message || `Erreur HTTP ${response.status}`);
                setButtonFinished(button, true);
                return payload;
            } catch (error) {
                setButtonFinished(button, false);
                throw error;
            }
        }

        function refreshStatusesAfterDatabaseRows(rows, delay = 180) {
            // Quand la base change en AJAX, les boutons Build/TAR et TAR/Registre
            // ne doivent pas attendre un F5 : on invalide le cache navigateur puis
            // on relance les routes /builds/status_json pour les lignes touchees.
            const names = Array.from(new Set((rows || [])
                .map(row => cleanDockerName(row && row.name))
                .filter(name => name)));

            const invalidateOne = (kind, name) => {
                if (name) invalidateStatus(kind, name);
                else invalidateStatus(kind);
            };

            if (!names.length) {
                invalidateOne('build', '');
                invalidateOne('registry', '');
            } else {
                names.forEach(name => {
                    invalidateOne('build', name);
                    invalidateOne('registry', name);
                });
            }

            // /build/main n'a pas de vrais boutons registry dans la colonne TAR :
            // son badge "Registre" est vivant à part. Après un changement de
            // plateforme/registre, on le met immédiatement en vérification puis on
            // force le recalcul réel du registre, sans F5 ni bouton cache manuel.
            if (isBuildMainPage()) {
                const targetNames = names.length ? names : mainRegistryNames();
                targetNames.forEach(name => {
                    statusCache.registry.delete(name);
                    setMainRegistryState(name, 'running', 'Vérif registre…', 'Recalcul réel du registre après modification de la base.');
                });
            }

            window.setTimeout(() => startStatusScan('build', true), delay);
            window.setTimeout(() => startStatusScan('registry', true), delay + 350);
            if (isBuildMainPage()) window.setTimeout(() => startMainRegistryStatusScan(true), delay + 650);
            setStatus('Base de données enregistrée : recalcul AJAX des boutons Build/TAR et TAR → Registre…');
        }

        async function saveDbRow(button) {
            const row = button.closest('tr');
            if (!row) return;
            const rowData = dbRowPayload(row);
            try {
                const payload = await postDbRows([rowData], button);
                setDbRowState(row, true, payload.message || 'Enregistré');
                refreshStatusesAfterDatabaseRows([rowData]);
            } catch (error) {
                setDbRowState(row, false, error.message || 'Erreur');
            }
        }

        async function saveDbForm() {
            // Compatibilité vieux HTML/cache : sauvegarde dynamique de toutes les lignes, sans submit navigateur.
            const rows = Array.from(document.querySelectorAll('#dbTable tbody tr')).map(dbRowPayload);
            try {
                await postDbRows(rows, null);
                document.querySelectorAll('#dbTable tbody tr').forEach(row => setDbRowState(row, true, 'Enregistré'));
                refreshStatusesAfterDatabaseRows(rows, 250);
            } catch (error) {
                console.error(error.message || 'Erreur pendant l’enregistrement.');
            }
        }

        async function deleteDbRow(button) {
            const row = button.closest('tr');
            if (!row) return;
            if (row.dataset.unsaved === '1') {
                row.remove();
                setupDbScroll();
                bindKeyboardRows();
                ensureKeyboardSelection();
                return;
            }
            const current = dbRowPayload(row);
            try {
                await postDbRows([{name: current.name, registry: '', platforms: '', mode: ''}], button);
                refreshStatusesAfterDatabaseRows([current]);
                row.remove();
                setupDbScroll();
                bindKeyboardRows();
                ensureKeyboardSelection();
            } catch (error) {
                setDbRowState(row, false, error.message || 'Erreur suppression');
            }
        }

        function removeDbRow(button) { deleteDbRow(button); }
        function fillDbAll() { document.querySelectorAll('#dbTable tbody tr').forEach(row => fillDbRow(row.querySelector('button'))); }

        async function fillDbAllAndSave(button) {
            const rowsEls = Array.from(document.querySelectorAll('#dbTable tbody tr'));
            if (!rowsEls.length) return;

            rowsEls.forEach(row => fillDbRow(row.querySelector('button')));
            const rows = rowsEls.map(dbRowPayload);

            try {
                const payload = await postDbRows(rows, button);
                rowsEls.forEach(row => setDbRowState(row, true, payload.message || 'Enregistré'));

                // Le bouton magique lance aussi le remplissage côté serveur pour les
                // dossiers build détectés qui ne seraient pas encore visibles dans le tableau.
                try {
                    const autoResponse = await fetch(databaseAutofillUrl, {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({})
                    });
                    const autoPayload = await autoResponse.json().catch(() => ({}));
                    if (autoResponse.ok && autoPayload.ok && Number(autoPayload.count || 0) > 0) {
                        setStatus(autoPayload.message || 'Base complétée automatiquement.');
                        window.setTimeout(() => window.location.reload(), 650);
                        return;
                    }
                } catch (autoError) {
                    console.warn(autoError);
                }

                refreshStatusesAfterDatabaseRows(rows, 250);
                setStatus('Remplissage auto all enregistré.');
            } catch (error) {
                rowsEls.forEach(row => setDbRowState(row, false, error.message || 'Erreur'));
                setStatus('Erreur Remplir auto all : ' + (error.message || error));
            }
        }

        function buildDbOptionPlatformValue(value) {
            const raw = String(value || '').trim();
            if (raw === 'linux/amd64,linux/arm64' || raw === 'linux/arm64,linux/amd64') return 'linux/amd64,linux/arm64';
            if (raw.includes('linux/arm64') && raw.includes('linux/amd64')) return 'linux/amd64,linux/arm64';
            if (raw.includes('linux/arm64')) return 'linux/arm64';
            return 'linux/amd64';
        }

        function buildDbOptionModeValue(value) {
            return String(value || '').trim() === '1' ? '1' : '0';
        }

        function openBuildDbOptionModalFromButton(button) {
            if (!button) return;
            openBuildDbOptionModal({
                name: button.dataset.name || '',
                registry: button.dataset.registry || '',
                registry_suggested: button.dataset.registrySuggested || '',
                platforms: button.dataset.platforms || '',
                platform_suggested: button.dataset.platformSuggested || '',
                mode: button.dataset.mode || '0'
            }, button);
        }

        function ensureBuildDbOptionModal() {
            let overlay = $('buildDbOptionOverlay');
            if (overlay) return overlay;

            const wrap = document.createElement('div');
            wrap.innerHTML = `
                <div id="buildDbOptionOverlay" class="build-db-option-overlay" style="display:none;">
                    <div class="build-db-option-box" role="dialog" aria-modal="true" aria-labelledby="buildDbOptionTitle">

                            <label class="build-db-option-field">

                                <label class="build-db-option-field">
                                    <span>Plateforme</span>
                                    <select class="select-input" id="buildDbOptionPlatform">
                                        <option value="linux/amd64">linux/amd64</option>
                                        <option value="linux/amd64,linux/arm64">linux/amd64 + linux/arm64</option>
                                        <option value="linux/arm64">linux/arm64</option>

                                        <option value="0">HTTP</option>

                                    </select>
                                </label>
                            </div>
                            <div class="build-db-option-help">Réglage rapide de la base interne. Par défaut : linux/amd64 + HTTP. La page Base de données reste disponible pour les modifications en masse.</div>

                        </div>

            overlay = wrap.firstElementChild;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', event => {

        function openBuildDbOptionModal(data, sourceButton = null) {
            const overlay = ensureBuildDbOptionModal();
            const name = cleanDockerName(data && data.name || '');
            if (!name) return;

            const registry = String((data && data.registry) || (data && data.registry_suggested) || '').trim();
            const suggested = String((data && data.registry_suggested) || registry || '').trim();
            const platform = buildDbOptionPlatformValue((data && data.platforms) || (data && data.platform_suggested) || 'linux/amd64');
            const mode = buildDbOptionModeValue(data && data.mode);

            overlay.dataset.name = name;
            overlay.dataset.sourceButtonId = '';
            if (sourceButton) {
                if (!sourceButton.id) sourceButton.id = 'buildDbOptionBtn_' + name.replace(/[^a-zA-Z0-9_-]+/g, '_') + '_' + Date.now();
                overlay.dataset.sourceButtonId = sourceButton.id;
            }

            const title = $('buildDbOptionTitle');
            const nameBox = $('buildDbOptionName');
            const registryInput = $('buildDbOptionRegistry');
            const platformSelect = $('buildDbOptionPlatform');
            const modeSelect = $('buildDbOptionMode');
            const status = $('buildDbOptionStatus');

            if (title) title.textContent = 'Options Build';
            if (nameBox) nameBox.textContent = 'Docker : ' + name;
            if (registryInput) {
                registryInput.value = registry;
                registryInput.placeholder = suggested;
            }
            if (platformSelect) platformSelect.value = platform;
            if (modeSelect) modeSelect.value = mode;
            if (status) {
                status.textContent = '';
                status.classList.remove('is-error', 'is-ok');

            overlay.style.display = 'flex';

        function closeBuildDbOptionModal() {
            const overlay = $('buildDbOptionOverlay');
            if (overlay) overlay.style.display = 'none';
        }

        function findBuildTableRow(name) {
            const clean = cleanDockerName(name);
            if (!clean) return null;
            return Array.from(document.querySelectorAll('#buildTable tbody tr[data-build-name]')).find(row => cleanDockerName(row.dataset.buildName || '') === clean) || null;
        }

        function buildDbOptionPlatformBadges(platforms) {
            const value = String(platforms || 'linux/amd64');
            const amd = value.includes('linux/amd64');
            const arm = value.includes('linux/arm64');
            return `
                <span class="badge ${amd ? 'badge-info' : 'badge-muted'}">amd64</span>
                <span class="badge ${arm ? 'badge-info' : 'badge-muted'}">arm64</span>`;
        }

        function applyBuildDbOptionToRow(rowData) {
            const row = findBuildTableRow(rowData.name);
            if (!row) return;
            const name = cleanDockerName(rowData.name);
            const registry = String(rowData.registry || '').trim();
            const platforms = buildDbOptionPlatformValue(rowData.platforms || 'linux/amd64');
            const mode = buildDbOptionModeValue(rowData.mode);

            const platformCell = row.querySelector('[data-build-platform-cell]');
            if (platformCell) {
                const tag = platformCell.querySelector('.tag-val');
                const arch = platformCell.querySelector('.arch-row');
                if (tag) tag.textContent = platforms;
                if (arch) arch.innerHTML = buildDbOptionPlatformBadges(platforms);
            }

            const registryCell = row.querySelector('[data-build-registry-cell]');
            if (registryCell) {
                registryCell.innerHTML = registry
                    ? `<span class="badge badge-ok">OK</span><div class="name-sub">${escapeHtml(registry)}</div>`
                    : '<span class="badge badge-warn">à compléter</span>';
            }

            const metaHint = row.querySelector('[data-build-meta-hint]');
            if (metaHint) {
                metaHint.innerHTML = registry && platforms
                    ? '<span class="badge badge-ok">base OK</span>'
                    : '<span class="badge badge-warn">base incomplète</span>';
            }

            const optionButton = row.querySelector('.build-db-option-btn');
            if (optionButton) {
                optionButton.dataset.registry = registry;
                optionButton.dataset.platforms = platforms;
                optionButton.dataset.mode = mode;
            }

            row.dataset.filter = `${name} ${registry.toLowerCase()} ${platforms.toLowerCase()} ${registry ? 'registre' : 'a completer'} dockerfile tar`;
        }

        async function saveBuildDbOptionModal(button) {
            const overlay = $('buildDbOptionOverlay');
            if (!overlay) return;
            const name = cleanDockerName(overlay.dataset.name || '');
            if (!name) return;

            const registryInput = $('buildDbOptionRegistry');
            const platformSelect = $('buildDbOptionPlatform');
            const modeSelect = $('buildDbOptionMode');
            const status = $('buildDbOptionStatus');
            const rowData = {
                name,
                registry: String(registryInput?.value || registryInput?.placeholder || '').trim(),
                platforms: buildDbOptionPlatformValue(platformSelect?.value || 'linux/amd64'),
                mode: buildDbOptionModeValue(modeSelect?.value || '0')
            };

            if (status) {
                status.textContent = 'Enregistrement…';
                status.classList.remove('is-error', 'is-ok');
            }

            try {
                const payload = await postDbRows([rowData], button);
                applyBuildDbOptionToRow(rowData);
                refreshStatusesAfterDatabaseRows([rowData], 180);
                if (status) {
                    status.textContent = payload.message || 'Options enregistrées.';
                    status.classList.add('is-ok');
                }
                window.setTimeout(() => closeBuildDbOptionModal(), 450);
            } catch (error) {
                if (status) {
                    status.textContent = error.message || 'Erreur pendant l’enregistrement.';
                    status.classList.add('is-error');
                }
            }
        }

        function filterDbRows() {
            const query = String($('dbSearch')?.value || '').toLowerCase().trim();
            document.querySelectorAll('#dbTable tbody tr').forEach(row => {
                const haystack = row.dataset.dbFilter || row.textContent.toLowerCase();
                row.style.display = (!query || haystack.includes(query)) ? '' : 'none';
            });
            bindKeyboardRows();
            ensureKeyboardSelection($('dbTable'));
        }

        function setupDbScroll() {
            const top = $('dbScrollTop');
            const inner = $('dbScrollTopInner');
            const wrap = $('dbTableWrap');
            const table = $('dbTable');
            if (!top || !inner || !wrap || !table) return;
            inner.style.width = table.scrollWidth + 'px';
            let syncing = false;
            top.onscroll = () => { if (syncing) return; syncing = true; wrap.scrollLeft = top.scrollLeft; syncing = false; };
            wrap.onscroll = () => { if (syncing) return; syncing = true; top.scrollLeft = wrap.scrollLeft; syncing = false; };
        }

        // --- NAVIGATION CLAVIER TABLEAUX ---
        const keyboardNav = { tableId: '', rowKey: '', actionIndex: 0 };

        function isTypingTarget(el) {
            if (!el) return false;
            const tag = String(el.tagName || '').toLowerCase();
            return ['input', 'textarea', 'select'].includes(tag) || el.isContentEditable;
        }

        function isAnyBuildModalOpen() {
            return Array.from(document.querySelectorAll('.modal-overlay, .build-db-option-overlay, .client-import-top-overlay, .build-delete-overlay, .tar-delete-overlay')).some(modal => {
                const style = window.getComputedStyle(modal);
                return style.display !== 'none' && style.visibility !== 'hidden';
            });
        }

        function activeTabPanel() {
            return document.querySelector('.tab-panel.active');
        }

        function visibleTableRows(table) {
            if (!table) return [];
            return Array.from(table.querySelectorAll('tbody tr')).filter(row => {
                const style = window.getComputedStyle(row);
                if (style.display === 'none' || style.visibility === 'hidden') return false;
                if (row.offsetParent === null) return false;
                if (row.querySelector('.empty-state')) return false;
                return row.querySelectorAll('td').length > 0;
            });
        }

        function activeKeyboardTable() {
            const panel = activeTabPanel();
            if (!panel) return null;
            const tables = Array.from(panel.querySelectorAll('table.build-table'));
            return tables.find(table => visibleTableRows(table).length > 0) || null;
        }

        function keyboardRowKey(row) {
            if (!row) return '';
            const dbName = row.querySelector('input[name="db_name"]');
            if (dbName && dbName.value) return 'db:' + dbName.value;
            const main = row.querySelector('.name-main');
            if (main && main.textContent.trim()) return 'name:' + main.textContent.trim();
            return row.dataset.filter || row.dataset.dbFilter || String(row.rowIndex || 0);
        }

        function rowActionButtons(row) {
            if (!row) return [];
            return Array.from(row.querySelectorAll('.actions-cell button, .db-actions-cell button')).filter(button => {
                const style = window.getComputedStyle(button);
                return style.display !== 'none' && style.visibility !== 'hidden' && !button.disabled;
            });
        }

        function clearKeyboardPaint() {
            document.querySelectorAll('.keyboard-selected-row').forEach(row => row.classList.remove('keyboard-selected-row'));
            document.querySelectorAll('.keyboard-action-focus').forEach(button => button.classList.remove('keyboard-action-focus'));
        }

        function paintKeyboardRow(row, actionIndex = keyboardNav.actionIndex, focusButton = false, scrollRow = false) {
            if (!row) return;
            clearKeyboardPaint();
            row.classList.add('keyboard-selected-row');
            const table = row.closest('table');
            keyboardNav.tableId = table ? table.id : '';
            keyboardNav.rowKey = keyboardRowKey(row);

            const buttons = rowActionButtons(row);
            if (buttons.length) {
                keyboardNav.actionIndex = Math.max(0, Math.min(actionIndex, buttons.length - 1));
                const activeButton = buttons[keyboardNav.actionIndex];
                activeButton.classList.add('keyboard-action-focus');
                if (focusButton && typeof activeButton.focus === 'function') {
                    activeButton.focus({preventScroll: true});
                }
            } else {
                keyboardNav.actionIndex = 0;
            }

            // Important : ne pas scroller automatiquement quand la page s'ouvre
            // ou quand on change d'onglet. Sinon l'onglet Build remonte/descend
            // tout seul et le menu du haut disparaît de l'écran.
            // On scroll uniquement pendant une vraie navigation clavier.
            if (scrollRow) {
                row.scrollIntoView({block: 'nearest', inline: 'nearest'});
            }
        }

        function ensureKeyboardSelection(table = activeKeyboardTable()) {
            if (!table) {
                clearKeyboardPaint();
                return null;
            }
            const rows = visibleTableRows(table);
            if (!rows.length) {
                clearKeyboardPaint();
                return null;
            }
            let row = null;
            if (keyboardNav.tableId === table.id && keyboardNav.rowKey) {
                row = rows.find(item => keyboardRowKey(item) === keyboardNav.rowKey) || null;
            }
            if (!row) row = rows[0];
            paintKeyboardRow(row, keyboardNav.actionIndex, false);
            return row;
        }

        function moveKeyboardRow(delta) {
            const table = activeKeyboardTable();
            const rows = visibleTableRows(table);
            if (!rows.length) return;
            const current = ensureKeyboardSelection(table);
            const currentIndex = Math.max(0, rows.indexOf(current));
            const nextIndex = Math.max(0, Math.min(rows.length - 1, currentIndex + delta));
            paintKeyboardRow(rows[nextIndex], 0, true, true);
        }

        function moveKeyboardAction(delta) {
            const row = ensureKeyboardSelection();
            const buttons = rowActionButtons(row);
            if (!buttons.length) return;
            const nextIndex = Math.max(0, Math.min(buttons.length - 1, keyboardNav.actionIndex + delta));
            paintKeyboardRow(row, nextIndex, true, true);
        }

        function jumpKeyboardRow(position) {
            const table = activeKeyboardTable();
            const rows = visibleTableRows(table);
            if (!rows.length) return;
            const index = position === 'end' ? rows.length - 1 : 0;
            paintKeyboardRow(rows[index], 0, true, true);
        }

        function activateKeyboardAction() {
            const row = ensureKeyboardSelection();
            if (!row) return;
            const buttons = rowActionButtons(row);
            if (buttons.length) {
                buttons[Math.max(0, Math.min(keyboardNav.actionIndex, buttons.length - 1))].click();
            }
        }

        function bindKeyboardRows() {
            document.querySelectorAll('table.build-table tbody tr').forEach(row => {
                if (row.dataset.keyboardBound === '1') return;
                row.dataset.keyboardBound = '1';
                row.addEventListener('click', event => {
                    if (isTypingTarget(event.target)) return;
                    const buttons = rowActionButtons(row);
                    const clickedButtonIndex = buttons.indexOf(event.target.closest('button'));
                    paintKeyboardRow(row, clickedButtonIndex >= 0 ? clickedButtonIndex : keyboardNav.actionIndex, false);
                });
            });
        }

        document.addEventListener('keydown', event => {
            if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Home', 'End', 'Enter', ' '].includes(event.key)) return;
            if (isAnyBuildModalOpen()) return;
            if (isTypingTarget(event.target)) return;
            if (!activeKeyboardTable()) return;

            event.preventDefault();
            if (event.key === 'ArrowUp') moveKeyboardRow(-1);
            else if (event.key === 'ArrowDown') moveKeyboardRow(1);
            else if (event.key === 'ArrowLeft') moveKeyboardAction(-1);
            else if (event.key === 'ArrowRight') moveKeyboardAction(1);
            else if (event.key === 'Home') jumpKeyboardRow('home');
            else if (event.key === 'End') jumpKeyboardRow('end');
            else if (event.key === 'Enter' || event.key === ' ') activateKeyboardAction();
        });


        window.addEventListener('load', () => {
            const wanted = new URLSearchParams(window.location.search).get('tab');
            if (wanted && $('tab-' + wanted)) switchTab(wanted);
            setupDbScroll();
            bindKeyboardRows();
            ensureKeyboardSelection();
        });
        window.addEventListener('resize', setupDbScroll);
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.tab-btn[data-tab-target]').forEach(btn => {
                btn.addEventListener('click', (event) => {
                    event.preventDefault();
                    switchTab(btn.dataset.tabTarget || 'build');
                });
            });
            const buildModeSelect = $('buildMode');
            if (buildModeSelect) {
                buildModeSelect.addEventListener('change', () => {
                    statusButtons('build').forEach(button => {
                        const cached = statusCache.build.get(statusName(button));
                        if (cached) applyStatusPayload(button, cached);
                    });
                });
            }
            ['registryHostInput', 'registryPortInput'].forEach(id => {
                const input = $(id);
                if (input) input.addEventListener('input', refreshBuildOptionsPreview);
            });
            refreshBuildOptionsPreview();
            resumeBackgroundJob();
            maybeAutoInitializeBuildCache();
            if (pageHasStatusButtons('build')) {
                window.setTimeout(() => startStatusScan('build'), 300);
            }
            if (pageHasStatusButtons('registry')) {
                window.setTimeout(() => startStatusScan('registry'), 650);
            }
            if (isBuildMainPage()) {
                window.setTimeout(() => startMainRegistryStatusScan(true), 750);
            }
            if (document.querySelector('[data-active-build-section="system"]')) {
                window.setTimeout(() => refreshRegistryServiceStatus(), 800);
            }
            bindKeyboardRows();
            ensureKeyboardSelection();        });
    </script>
  </div>
</main>
