<div class="modal-overlay" id="progressModal">
        <div class="modal-box">
            <h3 class="modal-title" id="modalTitle">Import registre</h3>
            <div class="status-box" id="modalStatus">Préparation…</div>
            <div class="progress-box">
                <div class="progress-head"><div class="progress-title" id="modalProgressTitle">Progression</div><div class="progress-value" id="modalProgressValue">0%</div></div>
                <div class="progress-track"><div class="progress-fill" id="modalProgressFill"></div></div>
            </div>
            <div class="modal-log" id="modalLog"></div>
            <div class="modal-actions"><button type="button" class="yoleo-btn yoleo-btn-muted" onclick="closeProgressModal()">Fermer</button></div>
        </div>
    </div>

    <script>
        function $(id) { return document.getElementById(id); }

        function fallbackIcon(img) {
            const defaultIcon = img.dataset.defaultIcon || '/static/logo.png';
            if (img.src.endsWith(defaultIcon)) return;
            img.src = defaultIcon;
        }

        function switchTab(target) {
            target = String(target || 'build').replace(/^tab-/, '');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tabTarget === target));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.toggle('active', panel.id === 'tab-' + target));
            try {
                const url = new URL(window.location.href);
                url.searchParams.set('tab', target);
                history.replaceState(null, '', url.toString());
            } catch (e) {}
            if (typeof setupDbScroll === 'function') setupDbScroll();
            if ((target === 'build' || target === 'registry') && typeof resumeBackgroundJob === 'function') {
                // La page lit maintenant build.jdom : pas de scan complet automatique à chaque navigation.
                // Les scans ciblés restent déclenchés après les actions UI.
                resumeBackgroundJob();
            }
            if (target === 'registry-system' && typeof refreshRegistryServiceStatus === 'function') {
                refreshRegistryServiceStatus();
            }
            if (target === 'registry-browser' && typeof startRegistryBrowserAutoRefresh === 'function') {
                startRegistryBrowserAutoRefresh();
            }
            if (target === 'logs' && typeof resumeBackgroundJob === 'function') {
                resumeBackgroundJob();
            }
            window.setTimeout(() => { bindKeyboardRows(); ensureKeyboardSelection(); }, 0);
        }

        function setStatus(message) { const el = $('statusBox'); if (el) el.textContent = message; }
        function setProgress(value) {
            const safe = Math.max(0, Math.min(100, Number(value) || 0));
            const fill = $('progressFill');
            const val = $('progressValue');
            if (fill) fill.style.width = safe + '%';
            if (val) val.textContent = safe + '%';
        }
        function setModalProgress(value) {
            const safe = Math.max(0, Math.min(100, Number(value) || 0));
            $('modalProgressFill').style.width = safe + '%';
            $('modalProgressValue').textContent = safe + '%';
        }
        function clearLog() { const out = $('terminal-output'); if (out) out.value = ''; setProgress(0); setStatus('Prêt.'); }
        function appendLog(text) {
            const box = $('terminal-output');
            if (!box) return;
            box.value += text;
            box.scrollTop = box.scrollHeight;
        }
        function appendModalLog(text) {
            const box = $('modalLog');
            box.textContent += text;
            box.scrollTop = box.scrollHeight;
        }
        function openProgressModal(title, progressTitle) {
            $('modalTitle').textContent = title || 'Opération en cours';
            $('modalProgressTitle').textContent = progressTitle || 'Progression';
            $('modalStatus').textContent = 'Démarrage…';
            $('modalLog').textContent = '';
            setModalProgress(0);
            $('progressModal').style.display = 'flex';
        }
        function closeProgressModal() { $('progressModal').style.display = 'none'; }
        function shouldAutoCloseProgressModal(action) {
            const value = String(action || '');
            return value === 'cache_refresh' || value.startsWith('build_') || value === 'registry_all' || value === 'registry_one';
        }

        const runStreamUrl = {{ url_for('builds_bp.run_stream')|tojson }};
        const runStartUrl = {{ url_for('builds_bp.run_start')|tojson }};
        const runStatusUrl = {{ url_for('builds_bp.run_status')|tojson }};
        const databaseJsonUrl = {{ url_for('builds_bp.database_json')|tojson }};
        const databaseAutofillUrl = {{ url_for('builds_bp.database_autofill_json')|tojson }};
        const statusJsonUrl = {{ url_for('builds_bp.status_json')|tojson }};
        const registryServiceStatusUrl = {{ url_for('builds_bp.registry_service_status_json')|tojson }};
        const buildLogLevelUrl = {{ url_for('builds_bp.build_log_level_route')|tojson }};
        const systemLogFile = {{ conf.SYSTEM_LOG_FILE|tojson }};
        const buildMainTtydUrl = {{ url_for('builds_bp.build_main_ttyd_route')|tojson }};
        const autoBuildCacheOnLoad = {{ ((not build_setup.required) and (not build_cache.exists) and (active_build_section in ['main', 'tarbuild']))|tojson }};
        const autoBuildCachePath = {{ (build_cache.path or '')|tojson }};

        function buildMainTtydElements() {
            return {
                modal: $('buildMainTtydModal'),
                frame: $('buildMainTtydFrame'),
                title: $('buildMainTtydModalTitle')
            };
        }

        function closeBuildMainTtyd() {
            const parts = buildMainTtydElements();
            if (!parts.modal) return;
            parts.modal.hidden = true;
            parts.modal.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('docker-ttyd-modal-open');
            if (parts.frame) parts.frame.src = 'about:blank';
        }

        async function openBuildMainTtyd(button) {
            setButtonRunning(button);
            try {
                const response = await fetch(buildMainTtydUrl, {headers: {'Accept': 'application/json'}, cache: 'no-store'});
                const data = await response.json().catch(() => ({ok: false, message: 'Réponse serveur illisible.'}));
                if (!response.ok || !data.ok || !data.url) throw new Error(data.message || 'Impossible d’ouvrir le log Build Main dans ttyd.');
                const parts = buildMainTtydElements();
                if (!parts.modal || !parts.frame) {
                    window.open(data.url, 'yoleo_build_main_ttyd', 'width=1200,height=760,resizable=yes,scrollbars=yes');
                    setButtonFinished(button, true);
                    return;
                }
                if (parts.title) parts.title.textContent = data.title || 'Log Build Main';
                parts.frame.src = data.url;
                parts.modal.hidden = false;
                parts.modal.setAttribute('aria-hidden', 'false');
                document.body.classList.add('docker-ttyd-modal-open');
                setButtonFinished(button, true);
            } catch (error) {
                setStatus(error.message || String(error));
                setButtonFinished(button, false);
            }
        }

        window.openBuildMainTtyd = openBuildMainTtyd;
        window.closeBuildMainTtyd = closeBuildMainTtyd;

        function saveBuildLogLevel(level) {
            const value = String(level || '').trim();
            if (!value) return;
            setStatus('Enregistrement du niveau de log…');
            fetch(buildLogLevelUrl, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({log_level: value})
            })
            .then(r => r.json().then(data => ({ok: r.ok && data.ok, data})))
            .then(result => {
                setStatus(result.ok ? (result.data.message || 'Niveau de log enregistré.') : (result.data.error || 'Erreur niveau de log.'));
            })
            .catch(err => setStatus('Erreur niveau de log : ' + err));
        }

        function refreshBuildOptionsPreview() {
            const host = ($('registryHostInput')?.value || '').trim();
            const port = ($('registryPortInput')?.value || '').trim();
            const target = host && port ? `${host}:${port}` : '';
            if ($('registryUrlPreview')) $('registryUrlPreview').textContent = target ? `http://${target}` : '—';
            if ($('httpRegistryPreview')) $('httpRegistryPreview').textContent = target || '—';
            const loginHost = $('loginHostInput');
            if (loginHost && target && (!loginHost.value || loginHost.dataset.autofilled === '1')) {
                loginHost.value = target;
                loginHost.dataset.autofilled = '1';
            }
        }

        function fillBuildOptionsAutoIp() {
            const input = $('registryHostInput');
            if (!input) return;
            input.value = input.dataset.autoIp || input.value;
            refreshBuildOptionsPreview();
        }

        function cleanDockerName(name) {
            return String(name || '').trim().replace(/\.tar$/i, '');
        }

        const STATUS_SCAN_PARALLEL = 4;
        const statusCache = { build: new Map(), registry: new Map() };
        const statusScanRunning = { build: false, registry: false };
        const statusScanQueued = { build: false, registry: false };

        function statusButtons(kind) {
            return Array.from(document.querySelectorAll(`button.smart-action-button[data-status-kind="${kind}"]`));
        }

        function statusName(button) {
            return cleanDockerName(button?.dataset?.statusName || '');
        }

        function statusBadge(button) {
            const cell = button?.closest('.actions-cell');
            if (!cell) return null;
            const kind = button.dataset.statusKind || '';
            const name = statusName(button);
            return Array.from(cell.querySelectorAll('.smart-status')).find(item => {
                return item.dataset.statusKind === kind && cleanDockerName(item.dataset.statusName || '') === name;
            }) || null;
        }


        function isBuildMainPage() {
            return Boolean(document.querySelector('#buildTable tr[data-build-name]') && window.location.pathname.includes('/build/main'));
        }

        function pageHasStatusButtons(kind) {
            return statusButtons(kind).length > 0;
        }

        const mainBuildRowMemory = {
            lastFailed: 0,
            stateByName: new Map(),
            registryByName: new Map(),
            overall: {
                active: false,
                action: '',
                total: 0,
                completed: new Set(),
                failed: new Set(),
                lastPercent: 0
            }
        };

        function mainBuildRow(name) {
            const cleanName = cleanDockerName(name);
            if (!cleanName) return null;
            return document.querySelector(`#buildTable tr[data-build-name="${CSS.escape(cleanName)}"]`);
        }

        function mainBuildButton(name) {
            const row = mainBuildRow(name);
            if (!row) return null;
            return row.querySelector('button.smart-action-button[data-status-kind="build"]');
        }

        function mainRegistryBadge(name) {
            const row = mainBuildRow(name);
            if (!row) return null;
            return row.querySelector('[data-main-registry-status]');
        }

        function mainRegistryBadgeClass(state) {
            if (state === 'ok') return 'badge-ok';
            if (state === 'error') return 'badge-no';
            if (state === 'running') return 'badge-warn';
            if (state === 'skipped') return 'badge-muted';
            return 'badge-warn';
        }

        function mainRegistryBadgeMarkup(name) {
            if (!isBuildMainPage()) return '';
            const cleanName = cleanDockerName(name);
            const saved = mainBuildRowMemory.registryByName.get(cleanName) || { state: 'unknown', label: 'Registre attente', title: 'Statut registre non recalculé.' };
            const cls = mainRegistryBadgeClass(saved.state);
            const label = escapeHtml(saved.label || 'Registre OK');
            const title = escapeHtml(saved.title || saved.label || '');
            const spinner = saved.state === 'running' ? '<span class="mini-spinner"></span>' : '';
            return `<span class="badge ${cls} build-main-registry-status" data-main-registry-status data-main-registry-name="${escapeHtml(cleanName)}" title="${title}">${spinner}${label}</span>`;
        }

        function setMainRegistryState(name, state, label, title = '') {
            if (!isBuildMainPage()) return;
            const cleanName = cleanDockerName(name);
            if (!cleanName) return;
            const saved = {
                state: state || 'unknown',
                label: String(label || '').trim() || 'Registre OK',
                title: title || label || '',
                at: Date.now()
            };
            mainBuildRowMemory.registryByName.set(cleanName, saved);
            const badge = mainRegistryBadge(cleanName);
            if (!badge) return;
            badge.className = `badge ${mainRegistryBadgeClass(saved.state)} build-main-registry-status`;
            badge.title = saved.title;
            badge.innerHTML = `${saved.state === 'running' ? '<span class="mini-spinner"></span>' : ''}${escapeHtml(saved.label)}`;
        }

        function mainRegistryUiFromPayload(payload) {
            const state = String(payload && payload.state || 'unknown');
            const label = String(payload && payload.label || '').trim();
            const message = String(payload && payload.message || '').trim();
            const needsAction = Boolean(payload && payload.needs_action);
            const canRun = Boolean(payload && payload.can_run);
            if (state === 'current' && !needsAction) {
                return {state: 'ok', label: 'Registre OK', title: message || 'Le registre contient déjà le TAR attendu.'};
            }
            if (state === 'needed' && canRun && needsAction) {
                return {state: 'unknown', label: 'À envoyer', title: message || 'Le registre doit recevoir ce TAR.'};
            }
            if (state === 'disabled') {
                return {state: 'skipped', label: label || 'Registre attente', title: message || 'Envoi registre indisponible pour le moment.'};
            }
            if (state === 'error') {
                return {state: 'error', label: 'Registre erreur', title: message || 'Erreur pendant la vérification du registre.'};
            }
            return {state: 'unknown', label: label || 'Registre attente', title: message || 'Statut registre à confirmer.'};
        }

        function payloadNeedsAction(payload) {
            return Boolean(payload && payload.can_run && payload.needs_action);
        }

        function payloadIsUsableCurrent(payload) {
            return Boolean(payload && payload.state === 'current' && !payload.needs_action);
        }

        function reconcileMainBuildButton(name) {
            if (!isBuildMainPage()) return;
            const cleanName = cleanDockerName(name);
            const row = mainBuildRow(cleanName);
            const button = mainBuildButton(cleanName);
            if (!row || !button) return;
            if (row.dataset.mainError === '1' || button.dataset.jobRunning === '1' || button.classList.contains('is-running')) return;

            const buildPayload = statusCache.build ? statusCache.build.get(cleanName) : null;
            const registryPayload = statusCache.registry ? statusCache.registry.get(cleanName) : null;
            const buildNeeds = payloadNeedsAction(buildPayload);
            const registryNeeds = payloadNeedsAction(registryPayload);
            const buildCurrent = payloadIsUsableCurrent(buildPayload);
            const registryCurrent = payloadIsUsableCurrent(registryPayload);

            button.classList.remove('smart-current', 'smart-needed', 'smart-checking', 'is-fail');
            button.style.display = '';

            if (buildPayload && !buildPayload.can_run && !registryNeeds) {
                button.disabled = true;
                button.innerHTML = buildPayload.label || 'Indispo';
                setStatusBadge(button, buildPayload.label || 'indispo', buildPayload.state || 'disabled', buildPayload.message || '', true);
                return;
            }

            if (buildNeeds) {
                button.disabled = false;
                button.classList.add('smart-needed');
                button.innerHTML = button.dataset.actionLabel || 'Build';
                setStatusBadge(button, buildPayload.label || 'Build', buildPayload.state || 'needed', buildPayload.message || 'Build nécessaire.', true);
                return;
            }

            if (buildCurrent && registryNeeds) {
                button.disabled = false;
                button.classList.add('smart-needed');
                button.innerHTML = 'Envoyer';
                setStatusBadge(button, 'À jour', 'current', 'Build TAR déjà à jour ; l’action enverra seulement le TAR au registre.', true);
                return;
            }

            if (buildCurrent && registryCurrent) {
                button.disabled = true;
                button.classList.add('smart-current');
                button.innerHTML = button.dataset.currentLabel || 'À jour';
                setStatusBadge(button, button.dataset.currentLabel || 'À jour', 'current', 'Build et registre sont à jour.', true);
                return;
            }

            if (buildCurrent) {
                button.disabled = registryNeeds ? false : true;
                button.classList.add(registryNeeds ? 'smart-needed' : 'smart-current');
                button.innerHTML = registryNeeds ? 'Envoyer' : (button.dataset.currentLabel || 'À jour');
                setStatusBadge(button, button.dataset.currentLabel || 'À jour', 'current', 'Build TAR à jour.', true);
            }
        }

        function applyMainRegistryPayload(name, payload) {
            if (!isBuildMainPage()) return;
            const cleanName = cleanDockerName(name || (payload && payload.name) || '');
            if (!cleanName || !payload) return;
            const ui = mainRegistryUiFromPayload(payload);
            setMainRegistryState(cleanName, ui.state, ui.label, ui.title);
            reconcileMainBuildButton(cleanName);
        }

        function mainRegistryNames() {
            return Array.from(document.querySelectorAll('#buildTable tr[data-build-name]'))
                .map(row => cleanDockerName(row.dataset.buildName || ''))
                .filter(name => name);
        }

        function isMainBuildWorkflowAction(action) {
            return action === 'build_registry_all' || action === 'build_registry_one';
        }

        function setMainOverallProgress(percent, label = '', detail = '', state = 'running') {
            if (!isBuildMainPage()) return;
            const box = document.getElementById('buildMainOverallProgress');
            if (!box) return;
            const safe = Math.max(0, Math.min(100, Number(percent) || 0));
            const fill = document.getElementById('buildMainOverallFill');
            const value = document.getElementById('buildMainOverallValue');
            const labelEl = document.getElementById('buildMainOverallLabel');
            const detailEl = document.getElementById('buildMainOverallDetail');
            box.classList.remove('is-running', 'is-ok', 'is-error');
            if (state) box.classList.add(`is-${state}`);
            if (fill) fill.style.width = safe.toFixed(1) + '%';
            if (value) value.textContent = Math.round(safe) + '%';
            if (labelEl) labelEl.textContent = label || 'Progression globale';
            if (detailEl) detailEl.textContent = detail || 'Progression globale Build → Registre';
        }

        function resetMainOverallProgress(action = '', name = '', total = 0) {
            if (!isBuildMainPage() || !isMainBuildWorkflowAction(String(action || ''))) return;
            const names = name ? [cleanDockerName(name)] : mainRegistryNames();
            const count = Number(total || names.length || 0);
            mainBuildRowMemory.overall = {
                active: true,
                action: String(action || ''),
                total: Math.max(count, 1),
                completed: new Set(),
                failed: new Set(),
                lastPercent: 0
            };
            setMainOverallProgress(0, 'Progression globale', count ? `0/${count} Docker traité` : 'Préparation du lot Build → Registre', 'running');
        }

        function updateMainOverallProgressFromPayload(payload, failedIncreased = false) {
            if (!isBuildMainPage() || !payload || typeof payload !== 'object') return;
            const action = String(payload.action || '');
            if (action !== 'build' && action !== 'registry') return;
            const name = cleanDockerName(payload.name || '');
            if (!name) return;
            const phase = String(payload.phase || '');
            const total = Math.max(Number(payload.total || mainBuildRowMemory.overall.total || mainRegistryNames().length || 1), 1);
            if (!mainBuildRowMemory.overall.active || mainBuildRowMemory.overall.total !== total) {
                mainBuildRowMemory.overall.active = true;
                mainBuildRowMemory.overall.total = total;
                if (!mainBuildRowMemory.overall.completed) mainBuildRowMemory.overall.completed = new Set();
                if (!mainBuildRowMemory.overall.failed) mainBuildRowMemory.overall.failed = new Set();
            }

            const overall = mainBuildRowMemory.overall;
            const isRegistryTerminal = action === 'registry' && (phase === 'registry_done' || phase === 'registry_error');
            const isBuildTerminalError = action === 'build' && (phase === 'build_error' || (phase === 'build_done' && failedIncreased));
            if (isRegistryTerminal || isBuildTerminalError) {
                overall.completed.add(name);
                if (phase === 'registry_error' || isBuildTerminalError) overall.failed.add(name);
            }

            const completed = overall.completed.size;
            const percent = Math.max(overall.lastPercent || 0, Math.min(100, (completed / total) * 100));
            overall.lastPercent = percent;

            let label = 'Progression globale';
            let detail = `${completed}/${total} Docker traité${completed > 1 ? 's' : ''}`;
            let state = overall.failed.size ? 'error' : 'running';
            if (action === 'build' && phase === 'build') detail = `${completed}/${total} traité · Build en cours : ${name}`;
            else if (action === 'build' && phase === 'build_done' && !failedIncreased) detail = `${completed}/${total} traité · Build terminé : ${name}, envoi registre à suivre`;
            else if (action === 'registry' && phase === 'registry') detail = `${completed}/${total} traité · Envoi registre : ${name}`;
            else if (action === 'registry' && phase === 'registry_done') detail = `${completed}/${total} traité · Registre OK : ${name}`;
            else if (action === 'registry' && phase === 'registry_error') detail = `${completed}/${total} traité · Erreur registre : ${name}`;
            else if (isBuildTerminalError) detail = `${completed}/${total} traité · Erreur build : ${name}`;

            if (completed >= total) {
                state = overall.failed.size ? 'error' : 'ok';
                label = overall.failed.size ? 'Terminé avec erreur' : 'Terminé';
                detail = `${completed}/${total} Docker traité${completed > 1 ? 's' : ''}` + (overall.failed.size ? ` · ${overall.failed.size} erreur(s)` : ' · Registre OK');
            }
            setMainOverallProgress(percent, label, detail, state);
        }

        function finishMainOverallProgress(job, ok, progress) {
            if (!isBuildMainPage() || !job || !isMainBuildWorkflowAction(String(job.action || ''))) return;
            const total = Math.max(Number((progress && progress.total) || mainBuildRowMemory.overall.total || mainRegistryNames().length || 1), 1);
            const completed = Math.max(mainBuildRowMemory.overall.completed ? mainBuildRowMemory.overall.completed.size : 0, Math.min(total, Number((progress && progress.current) || 0)));
            const percent = ok ? 100 : Math.max(mainBuildRowMemory.overall.lastPercent || 0, (completed / total) * 100);
            setMainOverallProgress(percent, ok ? 'Terminé' : 'Terminé avec erreur', `${completed}/${total} Docker traité${completed > 1 ? 's' : ''}`, ok ? 'ok' : 'error');
        }

        async function refreshMainRegistryForName(name) {
            if (!isBuildMainPage()) return;
            const cleanName = cleanDockerName(name);
            if (!cleanName) return;
            try {
                setMainRegistryState(cleanName, 'running', 'Vérif registre…', 'Vérification réelle du registre en cours.');
                const payload = await fetchStatusPayload('registry', cleanName);
                statusCache.registry.set(cleanName, payload);
                applyMainRegistryPayload(cleanName, payload);
            } catch (err) {
                const payload = {
                    ok: false,
                    kind: 'registry',
                    name: cleanName,
                    state: 'error',
                    label: 'Erreur',
                    message: String(err && (err.message || err) || 'Erreur statut registre'),
                    can_run: true,
                    needs_action: true
                };
                statusCache.registry.set(cleanName, payload);
                applyMainRegistryPayload(cleanName, payload);
            }
        }

        async function startMainRegistryStatusScan(force = false) {
            if (!isBuildMainPage()) return;
            const names = mainRegistryNames();
            let nextIndex = 0;
            async function worker() {
                while (nextIndex < names.length) {
                    const name = names[nextIndex++];
                    if (!force && statusCache.registry.has(name)) {
                        applyMainRegistryPayload(name, statusCache.registry.get(name));
                        continue;
                    }
                    await refreshMainRegistryForName(name);
                }
            }
            const workerCount = Math.min(STATUS_SCAN_PARALLEL, names.length);
            await Promise.all(Array.from({ length: workerCount }, worker));
        }

        function setMainBuildRowState(name, state, label, title = '') {
            if (!isBuildMainPage()) return;
            const cleanName = cleanDockerName(name);
            const row = mainBuildRow(cleanName);
            if (!row) return;
            const button = mainBuildButton(cleanName);
            const text = String(label || '').trim();
            row.classList.remove('build-main-row-running', 'build-main-row-registry', 'build-main-row-registry-error', 'build-main-row-error', 'build-main-row-ok');
            row.dataset.mainState = state || '';
            if (state === 'build') row.classList.add('build-main-row-running');
            if (state === 'registry') row.classList.add('build-main-row-registry');
            if (state === 'error') row.classList.add('build-main-row-error');
            if (state === 'ok') row.classList.add('build-main-row-ok');
            if (state === 'error') row.dataset.mainError = '1';
            if (state === 'build' || state === 'registry') delete row.dataset.mainError;
            if (button) {
                rememberButtonLabel(button);
                if (state === 'build' || state === 'registry') {
                    button.dataset.jobRunning = '1';
                    button.classList.add('is-running');
                    button.classList.remove('is-fail', 'is-ok');
                    button.disabled = true;
                    button.innerHTML = `<span class="btn-spinner"></span><span>${escapeHtml(text || 'En cours…')}</span>`;
                } else if (state === 'error') {
                    delete button.dataset.jobRunning;
                    button.classList.remove('is-running', 'smart-current', 'smart-needed', 'smart-checking');
                    button.classList.add('is-fail');
                    button.disabled = false;
                    button.style.display = '';
                    button.innerHTML = '<span class="btn-result">❌</span><span>Relancer</span>';
                } else if (state === 'ok') {
                    delete button.dataset.jobRunning;
                    button.classList.remove('is-running', 'is-fail');
                    button.classList.add('is-ok');
                    button.disabled = false;
                    button.style.display = '';
                    button.innerHTML = `<span class="btn-result">✅</span><span>${escapeHtml(text || 'Terminé')}</span>`;
                    window.setTimeout(() => {
                        if (row.dataset.mainState !== 'ok') return;
                        row.classList.remove('build-main-row-ok');
                        button.classList.remove('is-ok');
                        button.innerHTML = button.dataset.originalHtml || button.dataset.actionLabel || 'Build';
                        const cached = statusCache.build ? statusCache.build.get(cleanName) : null;
                        if (cached) applyStatusPayload(button, cached);
                    }, 2200);
                }
            }
            const badgeState = state === 'error' ? 'error' : (state === 'ok' ? 'current' : 'unknown');
            if (button) setStatusBadge(button, text || label || state, badgeState, title || text, true);
            mainBuildRowMemory.stateByName.set(cleanName, { state, label: text, title: title || text, at: Date.now() });
        }

        function clearMainBuildRowsForRun(action, name = '') {
            if (!isBuildMainPage() || String(action || '').indexOf('build_registry_') !== 0) return;
            mainBuildRowMemory.lastFailed = 0;
            mainBuildRowMemory.stateByName.clear();
            mainBuildRowMemory.registryByName.clear();
            resetMainOverallProgress(action, name);
            const names = name ? [cleanDockerName(name)] : Array.from(document.querySelectorAll('#buildTable tr[data-build-name]')).map(row => cleanDockerName(row.dataset.buildName || ''));
            names.forEach(item => {
                const row = mainBuildRow(item);
                if (!row) return;
                row.classList.remove('build-main-row-running', 'build-main-row-registry', 'build-main-row-registry-error', 'build-main-row-error', 'build-main-row-ok');
                delete row.dataset.mainError;
                delete row.dataset.mainState;
                setMainRegistryState(item, 'skipped', 'Registre attente', 'Le workflow principal va vérifier ou envoyer le TAR au registre.');
            });
        }

        function mainBuildRowHasStickyError(button) {
            if (!isBuildMainPage() || !button) return false;
            const row = mainBuildRow(statusName(button));
            return Boolean(row && row.dataset.mainError === '1');
        }

        function markMainBuildFailuresFromLog(logText) {
            if (!isBuildMainPage() || !logText) return;
            const buildPatterns = [
                /❌\s*BUILDX\s+ÉCHEC\s*:\s*([^\r\n]+)/gi,
                /⛔\s*Envoi\s+registre\s+ignoré\s+pour\s+([^:\r\n]+)\s*:/gi
            ];
            const registryPatterns = [
                /❌\s*(?:REGISTRE|ENVOI\s+REGISTRE|IMPORT)\s*(?:ÉCHEC|ERREUR)?\s*:\s*([^\s:\r\n]+)/gi,
                /❌\s*Envoi\s+registre\s+impossible\s+pour\s+([^:\r\n]+)\s*:/gi,
                /❌\s*Registre\s+cible\s+manquant\s+pour\s+([^\.\r\n]+)/gi
            ];
            buildPatterns.forEach(rx => {
                let m;
                while ((m = rx.exec(logText)) !== null) {
                    const name = cleanDockerName((m[1] || '').trim());
                    if (name) {
                        setMainBuildRowState(name, 'error', 'Erreur build', 'Erreur détectée dans le log Build principal.');
                        setMainRegistryState(name, 'skipped', 'Registre ignoré', 'Envoi registre ignoré parce que le build est en erreur.');
                    }
                }
            });
            registryPatterns.forEach(rx => {
                let m;
                while ((m = rx.exec(logText)) !== null) {
                    const name = cleanDockerName((m[1] || '').trim());
                    if (name) setMainRegistryState(name, 'error', 'Registre erreur', 'Erreur détectée dans le log pendant la phase registre.');
                }
            });
        }

        function updateMainBuildRowFromProgressPayload(payload) {
            if (!isBuildMainPage() || !payload || typeof payload !== 'object') return;
            const action = String(payload.action || '');
            if (action !== 'build' && action !== 'registry') return;
            const name = cleanDockerName(payload.name || '');
            if (!name) return;
            const phase = String(payload.phase || '');
            const label = String(payload.running_text || payload.phase_label || '').trim();
            const failed = Number(payload.failed || 0);
            const failedIncreased = failed > mainBuildRowMemory.lastFailed;
            updateMainOverallProgressFromPayload(payload, failedIncreased);
            mainBuildRowMemory.lastFailed = Math.max(mainBuildRowMemory.lastFailed, failed);

            if (action === 'build') {
                if (failedIncreased || phase === 'build_error') {
                    setMainBuildRowState(name, 'error', 'Erreur build', 'Le build TAR a échoué. Le registre est ignoré pour cette ligne.');
                    setMainRegistryState(name, 'skipped', 'Registre ignoré', 'Envoi registre non lancé parce que le build est en erreur.');
                    return;
                }
                if (phase === 'build_done') {
                    setMainBuildRowState(name, 'build', label || 'Build terminé…', 'Build terminé, préparation de l’envoi registre.');
                    setMainRegistryState(name, 'skipped', 'Registre attente', 'Le TAR est prêt, attente de la phase registre.');
                    return;
                }
                setMainBuildRowState(name, 'build', label || 'Build en cours…', 'Build TAR en cours.');
                setMainRegistryState(name, 'skipped', 'Registre attente', 'Le build TAR doit finir avant l’envoi registre.');
                return;
            }

            if (action === 'registry') {
                const row = mainBuildRow(name);
                if (row) {
                    row.classList.remove('build-main-row-running', 'build-main-row-registry', 'build-main-row-registry-error', 'build-main-row-error', 'build-main-row-ok');
                    row.classList.add((failedIncreased || phase === 'registry_error') ? 'build-main-row-registry-error' : 'build-main-row-registry');
                    row.dataset.mainState = (failedIncreased || phase === 'registry_error') ? 'registry-error' : 'registry';
                }
                if (failedIncreased || phase === 'registry_error') {
                    setMainRegistryState(name, 'error', 'Registre erreur', 'Erreur pendant l’envoi vers le registre.');
                    if (statusCache.registry) {
                        statusCache.registry.set(name, {kind: 'registry', name, state: 'error', label: 'Erreur', message: 'Erreur pendant l’envoi vers le registre.', can_run: true, needs_action: true});
                    }
                    const button = mainBuildButton(name);
                    if (button) setStatusBadge(button, 'Build OK', 'current', 'Le build TAR est terminé, mais l’envoi registre a échoué.', true);
                    return;
                }
                if (phase === 'registry_done') {
                    setMainRegistryState(name, 'ok', label || 'Registre à jour', 'TAR présent dans le registre.');
                    if (statusCache.registry) {
                        statusCache.registry.set(name, {kind: 'registry', name, state: 'current', label: 'À jour', message: 'TAR présent dans le registre.', can_run: true, needs_action: false});
                    }
                    setMainBuildRowState(name, 'ok', 'À jour', 'Build et registre terminés pour cette ligne.');
                    return;
                }
                setMainRegistryState(name, 'running', 'Envoi en cours', 'Envoi du TAR vers le registre.');
                const button = mainBuildButton(name);
                if (button) setStatusBadge(button, 'Build OK', 'current', 'Le build TAR est terminé, envoi registre en cours.', true);
            }
        }

        function badgeClassForState(state) {
            if (state === 'current') return 'badge-ok';
            if (state === 'needed') return 'badge-info';
            if (state === 'disabled') return 'badge-muted';
            if (state === 'error') return 'badge-no';
            return 'badge-warn';
        }

        function setStatusBadge(button, text, state, title, visible = true) {
            const badge = statusBadge(button);
            if (!badge) return;
            badge.className = `badge smart-status ${badgeClassForState(state)}${visible ? '' : ' is-hidden'}`;
            badge.textContent = text || '';
            badge.title = title || '';
        }

        function buildModeAllowsManualOverride() {
            return ['force', 'nocache', 'check'].includes(buildMode());
        }

        function resetSmartButton(button) {
            if (!button) return;
            if (button.dataset.jobRunning === '1' && activeJobAffectsButton(button)) return;
            button.classList.remove('smart-checking', 'smart-current', 'smart-needed');
            button.style.display = '';
            button.disabled = button.dataset.baseDisabled === '1';
            button.innerHTML = button.dataset.originalHtml || button.dataset.actionLabel || button.textContent || 'Action';
            setStatusBadge(button, '', 'disabled', '', false);
        }

        function markStatusChecking(button) {
            if (!button || button.classList.contains('is-running') || (button.dataset.jobRunning === '1' && activeJobAffectsButton(button))) return;
            if (mainBuildRowHasStickyError(button)) {
                setMainBuildRowState(statusName(button), 'error', 'Erreur build', 'Dernier build principal en erreur. Relance la ligne pour réessayer.');
                return;
            }
            rememberButtonLabel(button);
            button.classList.remove('smart-current', 'smart-needed');
            button.classList.add('smart-checking');
            button.style.display = '';
            button.disabled = true;
            button.innerHTML = '<span class="btn-spinner"></span><span>Vérif…</span>';
            setStatusBadge(button, 'calcul', 'unknown', 'Calcul en arrière-plan…', true);
        }

        function payloadIsCurrent(payload) {
            return Boolean(payload && payload.state === 'current' && !payload.needs_action);
        }

        function completeBackgroundRowFromPayload(button, payload) {
            if (!button || !payload || !payloadIsCurrent(payload)) return false;
            const kind = button.dataset.statusKind || payload.kind || '';
            const name = cleanDockerName(payload.name || statusName(button));
            if (kind && name && activeBackgroundCompleted[kind]) activeBackgroundCompleted[kind].add(name);
            delete button.dataset.jobRunning;
            button.classList.remove('is-running');
            return true;
        }

        function applyStatusPayload(button, payload) {
            if (!button || !payload) return;
            rememberButtonLabel(button);
            if (mainBuildRowHasStickyError(button) && button.dataset.jobRunning !== '1') {
                setMainBuildRowState(statusName(button), 'error', 'Erreur build', 'Dernier build principal en erreur. Relance la ligne pour réessayer.');
                return;
            }
            const kind = button.dataset.statusKind || payload.kind || '';
            const state = payload.state || 'unknown';
            const message = payload.message || '';
            const actionLabel = button.dataset.actionLabel || 'Action';
            const currentLabel = button.dataset.currentLabel || 'À jour';
            const cleanNameForMain = cleanDockerName(payload.name || statusName(button));

            if (payload.tar) {
                updateTarCells(payload.name || statusName(button), payload.tar);
            }
            if (isBuildMainPage() && kind === 'registry') {
                applyMainRegistryPayload(cleanNameForMain, payload);
            }

            // Important : pendant un build_all / registry_all, une ligne peut finir avant
            // la tâche globale. Avant, on gardait le spinner jusqu'à la fin de tout le job.
            // Maintenant, si le statut réel de la ligne dit « current », on libère seulement
            // cette ligne et elle repasse à « À jour » pendant que les autres continuent.
            if (button.dataset.jobRunning === '1' && activeJobAffectsButton(button)) {
                if (!completeBackgroundRowFromPayload(button, payload)) return;
            }

            button.classList.remove('smart-checking', 'smart-current', 'smart-needed');
            button.style.display = '';

            // Le statut API est la source de vérité. Un bouton peut être né disabled
            // parce que le TAR était absent au chargement, puis devenir disponible
            // après un build sans F5.
            if (!payload.can_run) {
                button.disabled = true;
                button.innerHTML = payload.label || actionLabel;
                setStatusBadge(button, payload.label || 'indispo', state, message, true);
                if (isBuildMainPage() && kind === 'build') reconcileMainBuildButton(cleanNameForMain);
                return;
            }

            if (state === 'current' && !payload.needs_action) {
                button.classList.add('smart-current');
                if (kind === 'registry') {
                    button.disabled = true;
                    button.innerHTML = currentLabel;
                    button.style.display = 'none';
                    setStatusBadge(button, currentLabel, state, message || 'Registre identique au TAR.', true);
                    return;
                }
                if (buildModeAllowsManualOverride()) {
                    button.disabled = false;
                    button.innerHTML = actionLabel;
                    setStatusBadge(button, currentLabel, state, `${message} Mode ${buildMode()} : action manuelle autorisée.`, true);
                    if (isBuildMainPage() && kind === 'build') reconcileMainBuildButton(cleanNameForMain);
                    return;
                }
                button.disabled = true;
                button.innerHTML = currentLabel;
                setStatusBadge(button, currentLabel, state, message || 'Rien à refaire.', true);
                if (isBuildMainPage() && kind === 'build') reconcileMainBuildButton(cleanNameForMain);
                return;
            }

            button.classList.add('smart-needed');
            button.disabled = false;
            button.innerHTML = actionLabel;
            setStatusBadge(button, payload.label || 'à faire', state, message, true);
            if (isBuildMainPage() && kind === 'build') reconcileMainBuildButton(cleanNameForMain);
        }

        async function fetchStatusPayload(kind, name) {
            const params = new URLSearchParams({ kind, name });
            const response = await fetch(`${statusJsonUrl}?${params.toString()}`, { credentials: 'same-origin', cache: 'no-store' });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(payload.message || `HTTP ${response.status}`);
            return payload;
        }

        async function refreshStatusForName(kind, name) {
            name = cleanDockerName(name);
            if (!['build', 'registry'].includes(kind) || !name) return;
            const buttons = statusButtons(kind).filter(button => statusName(button) === name);
            if (!buttons.length) return;
            buttons.forEach(markStatusChecking);
            try {
                const payload = await fetchStatusPayload(kind, name);
                statusCache[kind].set(name, payload);
                buttons.forEach(button => {
                    button.dataset.statusChecked = '1';
                    applyStatusPayload(button, payload);
                });
            } catch (err) {
                const payload = {
                    ok: false,
                    kind,
                    name,
                    state: 'error',
                    label: 'Erreur',
                    message: String(err && (err.message || err) || 'Erreur statut'),
                    can_run: true,
                    needs_action: true
                };
                statusCache[kind].set(name, payload);
                buttons.forEach(button => {
                    button.dataset.statusChecked = '1';
                    applyStatusPayload(button, payload);
                });
            }
        }

        async function runStatusPool(kind, buttons) {
            let nextIndex = 0;
            async function worker() {
                while (nextIndex < buttons.length) {
                    const button = buttons[nextIndex++];
                    const name = statusName(button);
                    if (!name) continue;
                    try {
                        const payload = await fetchStatusPayload(kind, name);
                        statusCache[kind].set(name, payload);
                        button.dataset.statusChecked = '1';
                        applyStatusPayload(button, payload);
                    } catch (err) {
                        const payload = {
                            ok: false,
                            kind,
                            name,
                            state: 'error',
                            label: 'Erreur',
                            message: String(err && (err.message || err) || 'Erreur statut'),
                            can_run: button.dataset.baseDisabled !== '1',
                            needs_action: true
                        };
                        statusCache[kind].set(name, payload);
                        button.dataset.statusChecked = '1';
                        applyStatusPayload(button, payload);
                    }
                }
            }
            const workerCount = Math.min(STATUS_SCAN_PARALLEL, buttons.length);
            await Promise.all(Array.from({ length: workerCount }, worker));
        }

        async function startStatusScan(kind, force = false) {
            if (!['build', 'registry'].includes(kind)) return;
            if (statusScanRunning[kind]) {
                statusScanQueued[kind] = true;
                return;
            }

            const buttons = statusButtons(kind).filter(button => force || button.dataset.statusChecked !== '1');
            if (!buttons.length) {
                if (kind === 'build') {
                    statusButtons('build').forEach(button => {
                        const cached = statusCache.build.get(statusName(button));
                        if (cached) applyStatusPayload(button, cached);
                    });
                }
                return;
            }

            statusScanRunning[kind] = true;
            buttons.forEach(markStatusChecking);
            setStatus(`Vérification ${kind === 'build' ? 'Build → TAR' : 'TAR → Registre'} : ${buttons.length} entrée(s), ${Math.min(STATUS_SCAN_PARALLEL, buttons.length)} en parallèle…`);

            try {
                await runStatusPool(kind, buttons);
            } finally {
                statusScanRunning[kind] = false;
                setStatus('Vérification terminée.');
                if (statusScanQueued[kind]) {
                    statusScanQueued[kind] = false;
                    startStatusScan(kind, true);
                }
            }
        }

        function invalidateStatus(kind, name = '') {
            const targets = statusButtons(kind).filter(button => !name || statusName(button) === cleanDockerName(name));
            targets.forEach(button => {
                button.dataset.statusChecked = '0';
                statusCache[kind].delete(statusName(button));
                resetSmartButton(button);
            });
        }

        function notifyBuildsParentRefresh(actionName = '', name = '') {
            const payload = {
                type: String(actionName || '').includes('registry') ? 'builds:registry-finished' : 'builds:task-finished',
                action: actionName || '',
                name: cleanDockerName(name || ''),
                stamp: Date.now()
            };
            try {
                if (window.top && window.top !== window && window.top.postMessage) {
                    window.top.postMessage(payload, window.location.origin);
                }
            } catch (e) {}
            try {
                localStorage.setItem('builds_refresh_stamp', String(payload.stamp));
            } catch (e) {}
        }

        function refreshStatusAfterTask(action, name = '') {
            const actionName = String(action || '');
            // Informe la page parente que les iframes dépendantes doivent être rechargées
            // (TAR -> Registre, Base de données et surtout Registre) sans F5 manuel.
            notifyBuildsParentRefresh(actionName, name);
            const refreshOne = (kind, delay) => {
                invalidateStatus(kind, name);
                window.setTimeout(() => startStatusScan(kind, true), delay);
            };

            if (actionName === 'cache_refresh') {
                setStatus('Cache Build mis à jour. Rechargement de la page…');
                window.setTimeout(() => window.location.reload(), 900);
                return;
            }

            if (actionName.startsWith('build_')) {
                refreshOne('build', 700);
                // Après un build, l'onglet TAR → Registre doit se mettre à jour
                // sans F5 : un TAR absent au chargement peut maintenant exister.
                refreshOne('registry', 1200);
                if (isBuildMainPage()) window.setTimeout(() => startMainRegistryStatusScan(true), 1400);
                return;
            }

            if (actionName === 'registry_service_delete_all_tags' || actionName === 'registry_service_clean_storage') {
                window.setTimeout(() => refreshRegistryServiceStatus(), 700);
                window.setTimeout(() => refreshRegistryBrowser(false).catch(() => {}), 1200);
                // Les tags/le stockage du registre ont change : on force aussi
                // l'onglet TAR -> Registre a recalculer les boutons Envoyer.
                refreshOne('registry', 1500);
                if (isBuildMainPage()) window.setTimeout(() => startMainRegistryStatusScan(true), 1700);
                return;
            }

            if (actionName.startsWith('registry_service_')) {
                window.setTimeout(() => refreshRegistryServiceStatus(), 700);
                return;
            }

            if (actionName.includes('registry')) {
                refreshOne('registry', 700);
            }
        }


        function setRegistryServiceText(id, value) {
            const el = $(id);
            if (el) el.textContent = value || '—';
        }

        function setRegistryServiceBadge(id, text, okClass) {
            const el = $(id);
            if (!el) return;
            el.textContent = text || '—';
            el.className = 'badge ' + (okClass || 'badge-muted');

        function renderRegistryServiceStatus(data) {

            setRegistryServiceBadge('rsvc-running', data.running ? 'Actif' : 'Arrêté', data.running ? 'badge-ok' : 'badge-no');
            setRegistryServiceText('rsvc-pid', data.pid || '—');

            setRegistryServiceText('rsvc-installed', data.service_installed ? 'oui' : 'non');

            setRegistryServiceText('rsvc-port', data.port || '—');
            setRegistryServiceText('rsvc-bind', data.bind_addr || '—');

        async function refreshRegistryServiceStatus(button = null) {
            setButtonRunning(button);
            try {
                const response = await fetch(registryServiceStatusUrl, {cache: 'no-store'});
                const data = await response.json();
                renderRegistryServiceStatus(data);
                setButtonFinished(button, true);
                return data;
            } catch (err) {
                setButtonFinished(button, false);
                setRegistryServiceBadge('rsvc-conf', 'Erreur', 'badge-no');
                setRegistryServiceText('rsvc-conf-error', String(err && (err.message || err) || 'Erreur statut'));

        function runRegistryService(action, button) {
            const actionName = String(action || '');
            const registryInlineActions = new Set([
                'registry_service_install',
                'registry_service_enable',
                'registry_service_disable',
                'registry_service_remove',
                'registry_service_start',
                'registry_service_restart',
                'registry_service_stop',
                'registry_service_generate_yaml',
                'registry_service_status'
            ]);
            const isRegistryBrowserMaintenance = Boolean(
                button &&
                button.closest &&
                button.closest('#tab-registry-browser') &&
                (actionName === 'registry_service_delete_all_tags' || actionName === 'registry_service_clean_storage')
            );
            const runInline = registryInlineActions.has(actionName) || isRegistryBrowserMaintenance;

            // Actions registre : plus de modale. On garde le spinner du bouton,
            // le statut Ajax et le message flottant de fin.
            runTask(actionName, '', 'normal', !runInline, button, runInline).then(() => {
                window.setTimeout(() => refreshRegistryServiceStatus(), 700);
                if (actionName === 'registry_service_delete_all_tags' || actionName === 'registry_service_clean_storage') {
                    window.setTimeout(() => {
                        if (typeof refreshRegistryBrowser === 'function') refreshRegistryBrowser(false).catch(() => {});
                    }, 1200);
                    invalidateStatus('registry');
                    window.setTimeout(() => startStatusScan('registry', true), 1500);
                    if (isBuildMainPage()) window.setTimeout(() => startMainRegistryStatusScan(true), 1700);
                }
            });
        }


        function buildMode() { return $('buildMode') ? $('buildMode').value : 'normal'; }
        function runCacheRefresh(button) { runTask('cache_refresh', '', 'normal', false, button, true); }

        function maybeAutoInitializeBuildCache() {
            if (!autoBuildCacheOnLoad) return;
            const lockKey = 'yoleo_auto_build_cache_' + (autoBuildCachePath || 'default');
            const now = Date.now();
            try {
                const previous = Number(sessionStorage.getItem(lockKey) || '0');
                if (previous && (now - previous) < 30000) return;
                sessionStorage.setItem(lockKey, String(now));
            } catch (e) {}
            setStatus('Cache Build absent : initialisation automatique…');
            window.setTimeout(() => runTask('cache_refresh', '', 'normal', false, null, true), 500);
        }

        function runBuildAll(button) { runTask('build_all', '', buildMode(), false, button, true); }
        function runBuildOne(name, button) { runTask('build_one', cleanDockerName(name), buildMode(), false, button, true); }
        function runMainBuildAll(button) { runTask('build_registry_all', '', buildMode(), false, button, true); }
        function runMainBuildOne(name, button) { runTask('build_registry_one', cleanDockerName(name), buildMode(), false, button, true); }
        function runRegistryAll(button) { runTask('registry_all', '', 'normal', false, button, true); }
        function runRegistryOne(name, button) { runTask('registry_one', cleanDockerName(name), 'normal', false, button, true); }

        function rememberButtonLabel(button) {
            if (!button || button.dataset.originalHtml) return;
            button.dataset.originalHtml = button.innerHTML;
        }
        function setButtonRunning(button) {
            if (!button) return;
            rememberButtonLabel(button);
            button.style.display = '';
            button.disabled = true;
            button.classList.remove('is-ok', 'is-fail');
            button.classList.add('is-running');
            button.innerHTML = `<span class="btn-spinner"></span><span>${button.dataset.runningText || 'En cours…'}</span>`;
        }
        function setButtonFinished(button, ok) {
            if (!button) return;
            if (!ok && mainBuildRowHasStickyError(button)) {
                button.classList.remove('is-running');
                button.classList.add('is-fail');
                button.disabled = false;
                button.innerHTML = '<span class="btn-result">❌</span><span>Relancer</span>';
                return;
            }
            button.classList.remove('is-running');
            button.classList.add(ok ? 'is-ok' : 'is-fail');
            button.innerHTML = `<span class="btn-result">${ok ? '✅' : '❌'}</span><span>${ok ? 'Terminé' : 'Erreur'}</span>`;
            window.setTimeout(() => {
                button.classList.remove('is-ok', 'is-fail');
                button.disabled = false;
                button.innerHTML = button.dataset.originalHtml || button.innerHTML;
                const kind = button.dataset.statusKind || '';
                const cache = kind && statusCache[kind] ? statusCache[kind].get(statusName(button)) : null;
                if (cache) applyStatusPayload(button, cache);
            }, 1800);
        }

        function updateRunningButtonTextFromProgressPayload(payload) {
            if (!payload || typeof payload !== 'object') return;
            const text = String(payload.running_text || payload.phase_label || '').trim();
            if (!text) return;
            const name = cleanDockerName(payload.name || '');
            const action = String(payload.action || '');
            allSmartActionButtons().forEach(button => {
                if (button.dataset.jobRunning !== '1') return;
                if (name && statusName(button) !== name) return;
                button.innerHTML = `<span class="btn-spinner"></span><span>${escapeHtml(text)}</span>`;
                // Sur /build/main, la phase registre a son propre badge dans la colonne TAR actuel.
                // On ne remplace donc pas le badge Build par "Envoi registre", sinon les deux états se mélangent.
                if (!(isBuildMainPage() && action === 'registry' && button.dataset.statusKind === 'build')) {
                    setStatusBadge(button, text, 'unknown', text, true);
                }
            });
        }

        function maybeRefreshRowFromProgressPayload(payload) {
            if (!payload || typeof payload !== 'object') return;
            const name = cleanDockerName(payload.name || '');
            const action = String(payload.action || '');
            const kind = action === 'build' ? 'build' : (action === 'registry' ? 'registry' : '');
            const phase = String(payload.phase || '');
            if (!kind || !name) return;

            // Ne pas recalculer le statut pendant une phase en cours : ça écrasait
            // les badges vivants de /build/main ("Envoi en cours") par l'ancien
            // état réel du registre, puis tout semblait se mettre à jour d'un coup
            // à la fin. On ne recalcule que sur une phase terminée ou en erreur.
            const terminalPhase = (
                (kind === 'build' && (phase === 'build_done' || phase === 'build_error')) ||
                (kind === 'registry' && (phase === 'registry_done' || phase === 'registry_error'))
            );
            if (!terminalPhase) return;

            const key = [activeBackgroundCompletedJobId || 'job', kind, phase, name, payload.current || 0, payload.done || 0, payload.failed || 0].join(':');
            if (progressRefreshSeen.has(key)) return;
            progressRefreshSeen.add(key);

            if (activeBackgroundJob && activeBackgroundJob.running && jobIsBulk(activeBackgroundJob.action)) {
                ensureActiveJobTracking(activeBackgroundJob);
                if (activeBackgroundCompleted[kind]) activeBackgroundCompleted[kind].add(name);
            }

            // Une ligne terminée dans un bulk peut quitter le spinner et recalculer son vrai état
            // pendant que les autres lignes continuent de tourner.
            if (kind === 'build') {
                window.setTimeout(() => refreshStatusForName('build', name), 450);
                // Le TAR vient peut-être d'être créé ou mis à jour : on vérifie le registre
                // juste après, mais sans écraser une phase registry déjà en cours.
                window.setTimeout(() => {
                    if (isBuildMainPage()) {
                        const row = mainBuildRow(name);
                        if (row && row.dataset.mainState === 'registry') return;
                        refreshMainRegistryForName(name);
                    } else {
                        refreshStatusForName('registry', name);
                    }
                }, 900);
                return;
            }

            if (kind === 'registry') {
                // Après un envoi, laisse quelques centaines de ms au registre local
                // avant de relire le manifest. Le badge reste vivant entre-temps.
                window.setTimeout(() => {
                    if (isBuildMainPage()) refreshMainRegistryForName(name);
                    else refreshStatusForName('registry', name);
                }, phase === 'registry_done' ? 900 : 300);
            }
        }

        function handleProgressPayload(payload, useModal) {
            if (!payload || typeof payload !== 'object') return;
            const percent = payload.percent || 0;
            setProgress(percent);
            lastRunFailedCount = Number(payload.failed || 0);
            const phase = payload.phase_label ? String(payload.phase_label) + ' · ' : '';
            const label = `${phase}${payload.current || 0}/${payload.total || 0} - OK ${payload.done || 0} - erreurs ${payload.failed || 0}${payload.name ? ' - ' + payload.name : ''}`;
            setStatus(label);
            updateMainBuildRowFromProgressPayload(payload);
            updateRunningButtonTextFromProgressPayload(payload);
            if (useModal) {
                setModalProgress(percent);
                $('modalStatus').textContent = label;
            }
            maybeRefreshRowFromProgressPayload(payload);
        }

        function consumeLines(text, useModal) {
            const lines = text.split(/(\r?\n)/);
            let rebuilt = '';
            for (let i = 0; i < lines.length; i++) {
                const part = lines[i];
                if (part === '') continue;
                if (part.startsWith('@@PROGRESS ')) {
                    try { handleProgressPayload(JSON.parse(part.substring('@@PROGRESS '.length)), useModal); } catch (e) {}
                    continue;
                }
                rebuilt += part;
            }
            if (rebuilt) {
                if (rebuilt.includes('❌')) runHadError = true;
                appendLog(rebuilt);
                if (useModal) appendModalLog(rebuilt);
            }
        }

        let lastRunFailedCount = 0;
        let runHadError = false;
        let activeRunPollTimer = null;
        let activeBackgroundJob = null;
        let activeBackgroundCompletedJobId = '';
        const activeBackgroundCompleted = { build: new Set(), registry: new Set() };
        const progressRefreshSeen = new Set();
        const backgroundProgressLastSeq = new Map();

        function jobStatusKind(action) {
            const value = String(action || '');
            if (value === 'build_registry_one' || value === 'build_registry_all') return 'build';
            if (value.startsWith('build_')) return 'build';
            if ((value.startsWith('registry_') || value.startsWith('dry_registry_')) && !value.startsWith('registry_service_')) return 'registry';
            return '';
        }

        function jobIsBulk(action) {
            const value = String(action || '');
            return value.endsWith('_all');
        }

        function ensureActiveJobTracking(job) {
            const jobId = String(job && job.id || '');
            if (jobId && jobId !== activeBackgroundCompletedJobId) {
                activeBackgroundCompletedJobId = jobId;
                activeBackgroundCompleted.build.clear();
                activeBackgroundCompleted.registry.clear();
                progressRefreshSeen.clear();
            }
        }

        function isBulkJobNameCompleted(kind, name) {
            return Boolean(kind && name && activeBackgroundCompleted[kind] && activeBackgroundCompleted[kind].has(cleanDockerName(name)));
        }

        function jobAffectsSmartButton(job, button) {
            if (!job || !button) return false;
            if (mainBuildRowHasStickyError(button)) return false;
            const kind = jobStatusKind(job.action);
            if (!kind || button.dataset.statusKind !== kind) return false;
            const buttonName = statusName(button);
            if (jobIsBulk(job.action)) {
                if (isBulkJobNameCompleted(kind, buttonName)) return false;
                const cached = statusCache[kind] ? statusCache[kind].get(buttonName) : null;
                if (payloadIsCurrent(cached)) {
                    if (activeBackgroundCompleted[kind]) activeBackgroundCompleted[kind].add(buttonName);
                    return false;
                }
                return true;
            }
            return buttonName === cleanDockerName(job.name || '');
        }

        function activeJobAffectsButton(button) {
            return Boolean(activeBackgroundJob && activeBackgroundJob.running && jobAffectsSmartButton(activeBackgroundJob, button));
        }

        function allSmartActionButtons() {
            return statusButtons('build').concat(statusButtons('registry'));
        }

        let runningBulkStatusRefresh = false;
        let runningBulkStatusRefreshAt = 0;

        async function refreshRunningBulkJobRows(job) {
            if (!job || !job.running || !jobIsBulk(job.action)) return;
            const now = Date.now();
            if (runningBulkStatusRefresh || (now - runningBulkStatusRefreshAt) < 900) return;
            const kind = jobStatusKind(job.action);
            if (!kind) return;
            const buttons = statusButtons(kind).filter(button => button.dataset.jobRunning === '1' || jobAffectsSmartButton(job, button));
            if (!buttons.length) return;
            runningBulkStatusRefresh = true;
            runningBulkStatusRefreshAt = now;
            try {
                await runStatusPool(kind, buttons);
            } catch (e) {
                // Le polling background ne doit jamais casser l'UI : au prochain tick on réessaie.
            } finally {
                runningBulkStatusRefresh = false;
            }
        }

        function markButtonsForBackgroundJob(job) {
            if (!job || !job.running) return;
            ensureActiveJobTracking(job);
            activeBackgroundJob = job;
            allSmartActionButtons().forEach(button => {
                if (jobAffectsSmartButton(job, button)) {
                    button.dataset.jobRunning = '1';
                    setButtonRunning(button);
                    setStatusBadge(button, 'en cours', 'unknown', 'Tâche en arrière-plan en cours.', true);
                } else if (button.dataset.jobRunning === '1') {
                    delete button.dataset.jobRunning;
                    resetSmartButton(button);
                    const kind = button.dataset.statusKind || '';
                    const cached = kind && statusCache[kind] ? statusCache[kind].get(statusName(button)) : null;
                    if (cached) applyStatusPayload(button, cached);
                }
            });
        }

        function finishButtonsForBackgroundJob(job, ok, fallbackButton = null) {
            const buttons = allSmartActionButtons().filter(button => button.dataset.jobRunning === '1' || jobAffectsSmartButton(job, button));
            if (!buttons.length && fallbackButton) buttons.push(fallbackButton);
            buttons.forEach(button => {
                delete button.dataset.jobRunning;
                setButtonFinished(button, ok);
            });
            if (activeBackgroundJob && job && activeBackgroundJob.id === job.id) {
                activeBackgroundJob = Object.assign({}, job, { running: false });
            }
        }

        function taskModalTitle(action, name) {
            if (action === 'cache_refresh') return 'Mise à jour du cache Build';
            if (action === 'build_registry_all') return 'Build principal de tous les Dockers vers registre';
            if (action === 'build_registry_one') return `Build principal de ${name} vers registre`;
            if (action === 'build_all') return 'Build de tous les Dockers vers TAR';
            if (action === 'build_one') return `Build de ${name} vers TAR`;
            if (action === 'registry_all') return 'Envoi de tous les TAR vers le registre';
            if (action === 'registry_one') return `Envoi de ${name}.tar vers le registre`;
            if (action === 'registry_service_status') return 'Statut complet du registre host';
            if (action === 'registry_service_generate_yaml') return 'Génération du registry.yml';
            if (action === 'registry_service_install') return 'Installation du service registry host';
            if (action === 'registry_service_start') return 'Démarrage du registry host';

            if (action === 'system_stacks_update') return 'stacks-host --update';

        function backgroundProgressKey(job) {
            if (!job || typeof job !== 'object') return 'unknown';
            return String(job.id || job.started_at || job.action || 'unknown');
        }

        function replayBackgroundProgressEvents(job, useModal = false) {
            if (!job || typeof job !== 'object') return false;
            const events = Array.isArray(job.progress_events) ? job.progress_events : [];
            if (!events.length) return false;

            const key = backgroundProgressKey(job);
            let lastSeq = Number(backgroundProgressLastSeq.get(key) || 0);
            const freshEvents = events
                .filter(event => Number(event && event.seq || 0) > lastSeq && event && typeof event.payload === 'object')
                .sort((a, b) => Number(a.seq || 0) - Number(b.seq || 0));

            freshEvents.forEach(event => {
                const seq = Number(event.seq || 0);
                if (seq > lastSeq) lastSeq = seq;
                handleProgressPayload(event.payload, useModal);
            });

            if (lastSeq > 0) backgroundProgressLastSeq.set(key, lastSeq);

            // Nettoyage léger : un seul job actif suffit au navigateur.
            if (backgroundProgressLastSeq.size > 4) {
                Array.from(backgroundProgressLastSeq.keys()).forEach(item => {
                    if (item !== key) backgroundProgressLastSeq.delete(item);
                });
            }
            return true;
        }

        function taskProgressTitle(action) {
            const actionValue = String(action || '');
            if (actionValue === 'cache_refresh') return 'Progression cache';
            if (actionValue === 'build_registry_one' || actionValue === 'build_registry_all') return 'Progression build + registre';
            if (actionValue.startsWith('build_')) return 'Progression build';
            if (String(action || '').startsWith('registry_service_')) return 'Progression service registre';
            if (String(action || '').includes('registry')) return 'Progression registre';
            if (String(action || '').startsWith('system_')) return 'Progression système';
            return 'Progression';
        }

        function renderBackgroundJob(job, useModal = false) {
            if (!job || !job.id) return;
            const progress = job.progress_payload || {
                percent: job.progress || 0,
                current: job.running ? 0 : 1,
                total: job.running ? 0 : 1,
                done: job.success ? 1 : 0,
                failed: job.failed || 0,
                name: job.name || ''
            };
            const modalVisible = useModal && $('progressModal').style.display === 'flex';
            const replayedProgress = replayBackgroundProgressEvents(job, modalVisible);
            if (!replayedProgress) handleProgressPayload(progress, modalVisible);

            const logText = job.log_tail || '';
            markMainBuildFailuresFromLog(logText);
            const output = $('terminal-output');
            if (output && output.value !== logText) {
                output.value = logText;
                output.scrollTop = output.scrollHeight;
            }
            if (useModal && $('progressModal').style.display === 'flex') {
                const modal = $('modalLog');
                if (modal && modal.textContent !== logText) {
                    modal.textContent = logText;
                    modal.scrollTop = modal.scrollHeight;
                }
            }

            lastRunFailedCount = Number(job.failed || progress.failed || 0);
            runHadError = Boolean(job.had_error);
            if (job.running) {
                markButtonsForBackgroundJob(job);
                refreshRunningBulkJobRows(job);
                setStatus('En cours : ' + [job.action, job.name, job.mode !== 'normal' ? job.mode : ''].filter(Boolean).join(' / '));
                if (useModal && $('progressModal').style.display === 'flex') $('modalStatus').textContent = 'En cours...';
                return;
            }
            const ok = job.success === true && lastRunFailedCount === 0 && !runHadError;
            finishMainOverallProgress(job, ok, progress);
            setStatus(job.status || (ok ? 'Termine.' : 'Termine avec erreur.'));
            if (useModal && $('progressModal').style.display === 'flex') {
                $('modalStatus').textContent = job.status || (ok ? 'Termine.' : 'Erreur.');
                setModalProgress(job.progress || (ok ? 100 : progress.percent || 0));
            }
        }

        async function fetchBackgroundJob() {
            const response = await fetch(runStatusUrl, { credentials: 'same-origin', cache: 'no-store' });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok || !payload.ok) throw new Error(payload.message || `HTTP ${response.status}`);
            return payload.job || {};
        }

        function stopBackgroundPolling() {
            if (activeRunPollTimer) {
                window.clearTimeout(activeRunPollTimer);
                activeRunPollTimer = null;
            }
        }

        function scheduleBackgroundPolling(action, name, useModal, button) {
            stopBackgroundPolling();
            const tick = async () => {
                try {
                    const job = await fetchBackgroundJob();
                    renderBackgroundJob(job, useModal);
                    if (job && job.running) {
                        const pollDelay = String((job && job.action) || action || '').startsWith('build_registry_') ? 600 : 1200;
                        activeRunPollTimer = window.setTimeout(tick, pollDelay);
                        return;
                    }
                    const ok = Boolean(job && job.success === true && !job.had_error && Number(job.failed || 0) === 0);
                    finishButtonsForBackgroundJob(job, ok, button);
                    if (job && job.action) refreshStatusAfterTask(job.action, job.name || name);
                    document.dispatchEvent(new CustomEvent('build:task-finished', {
                        detail: {
                            action: (job && job.action) || action,
                            name: (job && job.name) || name || '',
                            ok,
                            job: job || null,
                            message: (job && job.status) || ''
                        }
                    }));
                    if (useModal && ok && shouldAutoCloseProgressModal((job && job.action) || action)) {
                        window.setTimeout(() => closeProgressModal(), 900);
                    }
                } catch (err) {
                    consumeLines(`\nErreur statut background : ${String(err && (err.message || err) || err)}\n`, useModal);
                    setStatus('Erreur statut background.');
                    finishButtonsForBackgroundJob(activeBackgroundJob || { action, name }, false, button);
                    document.dispatchEvent(new CustomEvent('build:task-finished', {
                        detail: {
                            action,
                            name: name || '',
                            ok: false,
                            job: activeBackgroundJob || null,
                            message: String(err && (err.message || err) || 'Erreur statut background.')
                        }
                    }));
                }
            };
            activeRunPollTimer = window.setTimeout(tick, 500);
        }

        async function resumeBackgroundJob() {
            try {
                const job = await fetchBackgroundJob();
                if (!job || !job.id) return;
                renderBackgroundJob(job, false);
                if (job.running) scheduleBackgroundPolling(job.action || '', job.name || '', false, null);
            } catch (e) {}
        }
