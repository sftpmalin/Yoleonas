<div class="modal-backdrop" id="docker-action-confirm-modal">
        <div class="modal">
            <div class="modal-head">
                <div><div class="modal-title">Confirmation Docker</div><div class="hint" id="docker-action-confirm-subtitle">Action conteneur</div></div>
                <button class="yoleo-btn yoleo-btn-red yoleo-btn-mini" type="button" onclick="dockerCloseActionModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="modal-danger-text" id="docker-action-confirm-text"></div>
            </div>
            <div class="modal-actions">
                <button class="yoleo-btn yoleo-btn-muted" type="button" data-docker-modal-button onclick="dockerCloseActionModal()">Annuler</button>
                <button class="yoleo-btn yoleo-btn-red" type="button" data-docker-modal-button id="docker-action-confirm-yes">Confirmer</button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="docker-action-result-modal">
        <div class="modal">
            <div class="modal-head">
                <div><div class="modal-title" id="docker-action-result-title">Action Docker</div><div class="hint">Retour serveur</div></div>
                <button class="yoleo-btn yoleo-btn-red yoleo-btn-mini" type="button" onclick="dockerCloseResultModal()">×</button>
            </div>
            <div class="modal-body">
                <pre class="docker-log-box" id="docker-action-result-text"></pre>
            </div>
            <div class="modal-actions">
                <button class="yoleo-btn yoleo-btn-primary" type="button" data-docker-modal-button onclick="dockerCloseResultModal()">OK</button>
            </div>
        </div>
    </div>

</main>

    <div class="docker-ttyd-modal" id="dockerTtydModal" hidden aria-hidden="true">
        <div class="docker-ttyd-modal-backdrop" onclick="dockerCloseTtydModal()"></div>
        <section class="docker-ttyd-modal-box" role="dialog" aria-modal="true" aria-labelledby="dockerTtydModalTitle">
            <header class="docker-ttyd-modal-header">
                <strong id="dockerTtydModalTitle">Terminal Docker</strong>
                <button type="button" class="docker-ttyd-modal-close" onclick="dockerCloseTtydModal()" aria-label="Fermer">×</button>
            </header>
            <iframe class="docker-ttyd-modal-frame" id="dockerTtydFrame" title="Terminal Docker ttyd"></iframe>
        </section>
    </div>


<script>
(function () {
    'use strict';

    const dockerActionMessages = {
        start: 'Démarrage du conteneur...',
        stop: 'Arrêt du conteneur...',
        restart: 'Redémarrage du conteneur...',
        rm: 'Suppression du conteneur...',
        rmi: 'Suppression du conteneur et de son image...',
        start_all: 'Démarrage de tous les conteneurs...',
        stop_all: 'Arrêt de tous les conteneurs...',
        start_docker_service: 'Démarrage du service Docker...',
        restart_docker_service: 'Redémarrage du service Docker...',
        stop_docker_service: 'Arrêt du service Docker...'
    };

    const dockerQuietActions = new Set(['start_all', 'stop_all', 'start_docker_service', 'restart_docker_service', 'stop_docker_service']);
    const dockerDangerActions = new Set(['rm', 'rmi']);
    let dockerPendingAction = null;
    let dockerPendingLanForm = null;
    let dockerKeyboardRow = 0;
    let dockerKeyboardAction = 0;
    let dockerModalButton = 0;
    let dockerStatusTimer = null;

    function dockerStatusBox() {
        let box = document.getElementById('docker-action-status');
        const page = document.querySelector('.docker-page');
        if (!box && page) {
            box = document.createElement('div');
            box.id = 'docker-action-status';
            box.className = 'action-message docker-floating-message';
            box.textContent = 'Prêt.';
            box.hidden = true;
            page.appendChild(box);
        }
        return box;
    }

    function dockerSetStatus(message, ok = null) {
        const box = dockerStatusBox();
        if (!box) return;
        if (dockerStatusTimer) {
            clearTimeout(dockerStatusTimer);
            dockerStatusTimer = null;
        }
        box.hidden = false;
        box.textContent = message || 'Prêt.';
        box.classList.remove('docker-flash-hiding');
        box.classList.toggle('ok', ok === true);
        box.classList.toggle('bad', ok === false);
        if (ok === true) {
            dockerStatusTimer = setTimeout(() => {
                box.classList.add('docker-flash-hiding');
                setTimeout(() => { box.hidden = true; }, 220);
            }, 750);
        }
    }

    function dockerSetComposeStatus(message, ok = null) {
        const boxes = Array.from(document.querySelectorAll('[data-docker-compose-status]'));
        if (!boxes.length) {
            dockerSetStatus(message, ok);
            return;
        }
        boxes.forEach(box => {
            box.hidden = !message;
            box.textContent = message || '';
            box.classList.toggle('ok', ok === true);
            box.classList.toggle('bad', ok === false);
        });
    }

    function dockerSetButtonRunning(button, running) {
        if (!button) return;
        if (running) {
            if (!button.dataset.originalHtml) button.dataset.originalHtml = button.innerHTML;
            const label = (button.textContent || '').trim();
            const isIcon = button.classList.contains('yoleo-btn-icon');
            button.disabled = true;
            button.setAttribute('aria-busy', 'true');
            button.classList.add('is-running');
            button.innerHTML = '<span class="yoleo-btn-spinner" aria-hidden="true"></span>' + (isIcon ? '' : '<span class="yoleo-btn-running-label">' + label + '</span>');
            return;
        }
        if (button.dataset.originalHtml) {
            button.innerHTML = button.dataset.originalHtml;
            delete button.dataset.originalHtml;
        }
        button.disabled = false;
        button.removeAttribute('aria-busy');
        button.classList.remove('is-running');
    }

    function dockerActionLabel(action, form) {
        const name = form.querySelector('[name="docker_name"]')?.value || '';
        if (action === 'rm') return 'Supprimer le conteneur ' + name + ' ?';
        if (action === 'rmi') return 'Supprimer le conteneur ' + name + ' et son image ?';
        if (action === 'stop_all') return 'Arrêter tous les conteneurs Docker ?';
        if (action === 'stop_docker_service') return 'Arrêter le service Docker ?';
        return 'Confirmer cette action Docker ?';
    }

    function dockerActionUrl(form) {
        return form.getAttribute('action') || '/docker/action';
    }

    function dockerTtydModalElements() {
        return {
            modal: document.getElementById('dockerTtydModal'),
            frame: document.getElementById('dockerTtydFrame'),
            title: document.getElementById('dockerTtydModalTitle')
        };
    }

    window.dockerCloseTtydModal = function () {
        const {modal, frame} = dockerTtydModalElements();
        if (!modal) return;
        modal.hidden = true;
        modal.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('docker-ttyd-modal-open');
        if (frame) frame.src = 'about:blank';
    };

    window.dockerOpenContainerTtyd = async function (kind, containerName) {
        if (!containerName) return;
        dockerSetStatus((kind === 'exec' ? 'Ouverture du terminal Docker...' : 'Ouverture des logs Docker...'));
        try {
            const url = new URL('/docker/containers/ttyd', window.location.origin);
            url.searchParams.set('kind', kind || 'logs');
            url.searchParams.set('container', containerName);
            const response = await fetch(url.toString(), {headers: {'Accept': 'application/json'}, cache: 'no-store'});
            const data = await response.json().catch(() => ({ok: false, message: 'Réponse serveur illisible.'}));
            if (!response.ok || !data.ok || !data.url) throw new Error(data.message || 'Impossible d’ouvrir ttyd Docker.');

            const {modal, frame, title} = dockerTtydModalElements();
            if (!modal || !frame) {
                window.open(data.url, 'yoleo_docker_ttyd_' + String(kind || 'logs'), 'width=1200,height=760,resizable=yes,scrollbars=yes');
                return;
            }
            if (title) title.textContent = data.title || 'Terminal Docker';
            frame.src = data.url;
            modal.hidden = false;
            modal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('docker-ttyd-modal-open');
            dockerSetStatus(data.reused ? 'Terminal Docker déjà ouvert.' : 'Terminal Docker ouvert.', true);
        } catch (error) {
            dockerSetStatus(error.message || String(error), false);
        }
    };

    function dockerModalButtons() {
        const active = document.querySelector('#docker-action-confirm-modal.active, #docker-action-result-modal.active');
        if (!active) return [];
        return Array.from(active.querySelectorAll('[data-docker-modal-button], button')).filter(button => {
            if (button.disabled) return false;
            const style = window.getComputedStyle(button);
            return style.display !== 'none' && style.visibility !== 'hidden';
        });
    }

    function dockerPaintModalButton(index = dockerModalButton) {
        document.querySelectorAll('.modal-button-selected').forEach(el => el.classList.remove('modal-button-selected'));
        const buttons = dockerModalButtons();
        if (!buttons.length) return null;
        dockerModalButton = Math.max(0, Math.min(index, buttons.length - 1));
        const button = buttons[dockerModalButton];
        button.classList.add('modal-button-selected');
        try { button.focus({preventScroll: true}); }
        catch (error) { button.focus(); }
        return button;
    }

    function dockerOpenActionModal(form, action, submitter) {
        dockerPendingAction = {form, action, submitter};
        document.getElementById('docker-action-confirm-subtitle').textContent = dockerActionMessages[action] || 'Action Docker';
        document.getElementById('docker-action-confirm-text').textContent = dockerActionLabel(action, form);
        document.getElementById('docker-action-confirm-modal')?.classList.add('active');
        dockerModalButton = 1;
        setTimeout(() => dockerPaintModalButton(1), 40);
    }

    window.dockerCloseActionModal = function () {
        document.getElementById('docker-action-confirm-modal')?.classList.remove('active');
        document.querySelectorAll('.modal-button-selected').forEach(el => el.classList.remove('modal-button-selected'));
        dockerPendingAction = null;
        dockerPendingLanForm = null;
    };

    function dockerOpenResultModal(title, message, ok) {
        const modal = document.getElementById('docker-action-result-modal');
        document.getElementById('docker-action-result-title').textContent = title || (ok ? 'Action Docker OK' : 'Erreur Docker');
        document.getElementById('docker-action-result-text').textContent = message || '';
        modal?.classList.toggle('docker-modal-ok', ok === true);
        modal?.classList.toggle('docker-modal-error', ok === false);
        modal?.classList.add('active');
        dockerModalButton = 0;
        setTimeout(() => dockerPaintModalButton(0), 40);
    }

    window.dockerCloseResultModal = function () {
        document.getElementById('docker-action-result-modal')?.classList.remove('active');
        document.querySelectorAll('.modal-button-selected').forEach(el => el.classList.remove('modal-button-selected'));
        dockerRefreshContainers(true);
    };

    async function dockerRefreshContainers(force = false) {
        if (!force && document.querySelector('.modal-backdrop.active')) return false;
        const live = document.getElementById('docker-live-area');
        if (!live) return false;
        try {
            const url = new URL(window.location.href);
            url.searchParams.set('_', String(Date.now()));
            const response = await fetch(url.toString(), {cache: 'no-store'});
            const html = await response.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const fresh = doc.getElementById('docker-live-area');
            if (!fresh) return false;
            live.replaceWith(fresh);
            dockerBindActionForms();
            dockerInitKeyboard(true);
            return true;
        } catch (error) {
            return false;
        }
    }

    async function dockerSendAction(form, action, submitter) {
        const formData = new FormData(form);
        formData.set('action', action);
        const quietAction = dockerQuietActions.has(action);
        dockerSetButtonRunning(submitter, true);
        dockerSetStatus(dockerActionMessages[action] || 'Action Docker en cours...');

        try {
            const response = await fetch(dockerActionUrl(form), {method: 'POST', body: formData, headers: {'Accept': 'application/json'}});
            const data = await response.json().catch(() => ({status: 'error', message: 'Réponse serveur illisible.'}));
            if (!response.ok || data.status === 'error') throw new Error(data.message || 'Action Docker impossible.');
            dockerSetStatus(data.message || 'Action Docker terminée.', true);
            await dockerRefreshContainers(true);
            if (!quietAction && ['start_all', 'stop_all', 'start_docker_service', 'restart_docker_service', 'stop_docker_service'].includes(action)) {
                dockerOpenResultModal('Action Docker', data.message || 'Action terminée.', true);
            }
        } catch (error) {
            dockerSetStatus(error.message || String(error), false);
            if (!quietAction) {
                dockerOpenResultModal('Erreur Docker', error.message || String(error), false);
            }
        } finally {
            dockerSetButtonRunning(submitter, false);
        }
    }

    window.dockerRunDockerAction = async function (action, button) {
        const formData = new FormData();
        formData.set('action', action);
        dockerSetButtonRunning(button, true);
        dockerSetStatus(dockerActionMessages[action] || 'Action Docker en cours...');
        try {
            const response = await fetch('/docker/action', {
                method: 'POST',
                body: formData,
                headers: {'Accept': 'application/json'}
            });
            const data = await response.json().catch(() => ({status: 'error', message: 'Réponse serveur illisible.'}));
            if (!response.ok || data.status === 'error') throw new Error(data.message || 'Action Docker impossible.');
            dockerSetStatus(data.message || 'Action Docker terminée.', true);
            await dockerRefreshContainers(true);
        } catch (error) {
            dockerSetStatus(error.message || String(error), false);
        } finally {
            dockerSetButtonRunning(button, false);
        }
    };

    async function dockerSubmitAction(event) {
        const form = event.currentTarget;
        const submitter = event.submitter || document.activeElement;
        const action = submitter?.value || form.querySelector('[name="action"]')?.value || '';
        if (!action) return;

        event.preventDefault();
        if (dockerDangerActions.has(action)) {
            dockerOpenActionModal(form, action, submitter);
            return;
        }
        dockerSendAction(form, action, submitter);
    }

    document.getElementById('docker-action-confirm-yes')?.addEventListener('click', function () {
        const pending = dockerPendingAction;
        const lanForm = dockerPendingLanForm;
        dockerCloseActionModal();
        if (lanForm) {
            lanForm.submit();
            return;
        }
        if (!pending) return;
        dockerSendAction(pending.form, pending.action, pending.submitter);
    });

    function dockerBindActionForms() {
        document.querySelectorAll('form[action$="/docker/action"], #docker-live-area form').forEach(form => {
            if (form.dataset.dockerActionBound === '1') return;
            form.dataset.dockerActionBound = '1';
            form.addEventListener('submit', dockerSubmitAction);
        });
    }

    function dockerRows() {
        return Array.from(document.querySelectorAll('#docker-live-area .docker-container-row'));
    }

    function dockerRowButtons(row) {
        return Array.from(row?.querySelectorAll('button[name="action"]') || []).filter(button => !button.disabled);
    }

    function dockerClearKeyboard() {
        document.querySelectorAll('.keyboard-selected-row').forEach(row => row.classList.remove('keyboard-selected-row'));
        document.querySelectorAll('.keyboard-action-focus').forEach(button => button.classList.remove('keyboard-action-focus'));
    }

    function dockerKeepRowVisible(row) {
        if (!row) return;
        const scrollX = window.scrollX || window.pageXOffset || 0;
        row.scrollIntoView({block: 'nearest', inline: 'nearest'});
        if ((window.scrollX || window.pageXOffset || 0) !== scrollX) {
            window.scrollTo(scrollX, window.scrollY || window.pageYOffset || 0);
        }
    }

    function dockerSelectRow(index, actionIndex = dockerKeyboardAction, focus = true) {
        const rows = dockerRows();
        if (!rows.length) return null;
        dockerKeyboardRow = Math.max(0, Math.min(index, rows.length - 1));
        const row = rows[dockerKeyboardRow];
        dockerClearKeyboard();
        row.classList.add('keyboard-selected-row');
        const buttons = dockerRowButtons(row);
        if (buttons.length) {
            dockerKeyboardAction = Math.max(0, Math.min(actionIndex, buttons.length - 1));
            buttons[dockerKeyboardAction].classList.add('keyboard-action-focus');
            if (focus) {
                try { buttons[dockerKeyboardAction].focus({preventScroll: true}); }
                catch (error) { buttons[dockerKeyboardAction].focus(); }
            }
        }
        if (focus) dockerKeepRowVisible(row);
        return row;
    }

    function dockerInitKeyboard(preserve = false) {
        dockerRows().forEach((row, index) => {
            if (row.dataset.dockerKeyboardBound === '1') return;
            row.dataset.dockerKeyboardBound = '1';
            row.setAttribute('tabindex', '-1');
            row.addEventListener('click', event => {
                const buttons = dockerRowButtons(row);
                const button = event.target.closest('button[name="action"]');
                const actionIndex = button ? Math.max(0, buttons.indexOf(button)) : 0;
                dockerSelectRow(index, actionIndex, false);
            });
        });
        if (dockerRows().length) dockerSelectRow(preserve ? dockerKeyboardRow : 0, preserve ? dockerKeyboardAction : 0, false);
    }

    function dockerHandleKeyboard(event) {
        const modalButtons = dockerModalButtons();
        if (modalButtons.length) {
            if (!['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End', 'Enter', ' ', 'Escape'].includes(event.key)) return;
            event.preventDefault();
            if (event.key === 'Escape') { dockerCloseActionModal(); dockerCloseResultModal(); return; }
            if (event.key === 'Home') dockerPaintModalButton(0);
            else if (event.key === 'End') dockerPaintModalButton(modalButtons.length - 1);
            else if (event.key === 'ArrowRight' || event.key === 'ArrowDown') dockerPaintModalButton((dockerModalButton + 1) % modalButtons.length);
            else if (event.key === 'ArrowLeft' || event.key === 'ArrowUp') dockerPaintModalButton((dockerModalButton - 1 + modalButtons.length) % modalButtons.length);
            else if (event.key === 'Enter' || event.key === ' ') dockerPaintModalButton(dockerModalButton)?.click();
            return;
        }

        if (!document.getElementById('docker-live-area')) return;
        if (event.target?.closest('input, textarea, select, [contenteditable="true"]')) return;
        if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Home', 'End', 'Enter', ' '].includes(event.key)) return;
        const rows = dockerRows();
        if (!rows.length) return;
        event.preventDefault();
        if (event.key === 'ArrowDown') dockerSelectRow(dockerKeyboardRow + 1, 0, true);
        else if (event.key === 'ArrowUp') dockerSelectRow(dockerKeyboardRow - 1, 0, true);
        else if (event.key === 'Home') dockerSelectRow(0, 0, true);
        else if (event.key === 'End') dockerSelectRow(rows.length - 1, 0, true);
        else if (event.key === 'ArrowRight') dockerSelectRow(dockerKeyboardRow, dockerKeyboardAction + 1, true);
        else if (event.key === 'ArrowLeft') dockerSelectRow(dockerKeyboardRow, dockerKeyboardAction - 1, true);
        else if (event.key === 'Enter' || event.key === ' ') dockerRowButtons(rows[dockerKeyboardRow])[dockerKeyboardAction]?.click();
    }

    dockerBindActionForms();
    dockerInitKeyboard(false);
    document.addEventListener('keydown', dockerHandleKeyboard);

    window.openYoleoBrowser = function (mode, target, start) {
        const url = '/browser/' + encodeURIComponent(mode || 'folder') + '?target=' + encodeURIComponent(target || '') + '&path=' + encodeURIComponent(start || '/');
        window.open(url, 'yoleo_browser_' + String(target || 'path'), 'width=980,height=720,resizable=yes,scrollbars=yes');
    };

    function dockerComposeProgress(percent, message, failed = false) {
        const value = Math.max(0, Math.min(100, Number(percent) || 0));
        const label = message || (value + '%');
        const wraps = Array.from(document.querySelectorAll('[data-docker-compose-progress]'));
        const fillLegacy = document.getElementById('docker-compose-progress-fill');
        const textLegacy = document.getElementById('docker-compose-progress-text');
        if (!wraps.length) {
            const legacyWrap = document.getElementById('docker-compose-progress');
            if (legacyWrap) wraps.push(legacyWrap);
        }
        if (fillLegacy) fillLegacy.style.width = value + '%';
        if (textLegacy) textLegacy.textContent = label;
        wraps.forEach(wrap => {
            const fill = wrap.querySelector('[data-docker-compose-progress-fill]');
            const text = wrap.querySelector('[data-docker-compose-progress-text]');
            if (fill) fill.style.width = value + '%';
            if (text) text.textContent = label;
            wrap.classList.toggle('is-ok', value >= 100 && !failed);
            wrap.classList.toggle('is-bad', !!failed);
        });
    }

    function dockerParseProgressLine(line) {
        if (!line || !line.startsWith('@@PROGRESS')) return null;
        try { return JSON.parse(line.replace(/^@@PROGRESS\s*/, '')); }
        catch (error) { return null; }
    }

    function dockerLineMeansFailure(line) {
        const clean = String(line || '').trim();
        if (!clean) return false;
        if (clean.startsWith('@@PROGRESS')) {
            const progress = dockerParseProgressLine(clean);
            return Number(progress?.failed || 0) > 0;
        }
        // Ne pas transformer le résumé final en erreur quand le compteur indique 0.
        // Exemple : "Stacks erreur : 0" ou un ancien log avec "❌ Stacks erreur : 0".
        if (/stacks?\s+erreurs?\s*:\s*0\b/i.test(clean) || /erreurs?\s*:\s*0\b/i.test(clean) || /failed["']?\s*:\s*0\b/i.test(clean)) {
            return false;
        }
        return /❌/.test(clean) || /\b(erreur|erreurs|failed|failure|error)\b/i.test(clean);
    }

    function dockerShowComposeLogButton(failed) {
        const buttons = Array.from(document.querySelectorAll('[data-docker-compose-log-open]'));
        const legacy = document.getElementById('docker-compose-log-open');
        if (legacy && !buttons.includes(legacy)) buttons.push(legacy);
        buttons.forEach(logButton => {
            logButton.hidden = false;
            logButton.classList.toggle('is-bad', !!failed);
            logButton.classList.toggle('is-ok', !failed);
            logButton.title = failed ? 'Erreur Compose : ouvrir le vrai log ttyd' : 'Ouvrir le log Compose ttyd';
        });
    }

    window.dockerOpenComposeTtyd = async function () {
        dockerSetComposeStatus('Ouverture du vrai log Compose...');
        try {
            const response = await fetch('/docker/compose/ttyd', {headers: {'Accept': 'application/json'}, cache: 'no-store'});
            const data = await response.json().catch(() => ({ok: false, message: 'Réponse serveur illisible.'}));
            if (!response.ok || !data.ok || !data.url) throw new Error(data.message || 'Impossible d’ouvrir ttyd Compose.');
            const {modal, frame, title} = dockerTtydModalElements();
            if (!modal || !frame) {
                window.open(data.url, 'yoleo_docker_compose_log', 'width=1200,height=760,resizable=yes,scrollbars=yes');
                return;
            }
            if (title) title.textContent = data.title || 'Logs Docker Compose';
            frame.src = data.url;
            modal.hidden = false;
            modal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('docker-ttyd-modal-open');
            dockerSetComposeStatus('Log Compose ouvert.', true);
        } catch (error) {
            dockerSetComposeStatus(error.message || String(error), false);
        }
    };

    window.dockerRunStream = async function (action, button) {
        const log = document.getElementById('docker-stream-log');
        const logButtons = Array.from(document.querySelectorAll('[data-docker-compose-log-open]'));
        const attachOnly = action === '__attach';
        let failed = false;
        let lastProgress = 0;
        let composeFailedCount = null;
        let tail = '';
        const visibleLog = log && !log.classList.contains('docker-compose-inline-log');
        if (log) {
            log.hidden = !visibleLog;
            log.style.display = visibleLog ? 'block' : 'none';
            log.textContent = attachOnly ? 'Reprise du suivi Compose...\n' : 'Lancement...\n';
        }
        logButtons.forEach(logButton => {
            logButton.hidden = false;
            logButton.classList.remove('is-bad', 'is-ok');
        });
        if (!attachOnly) dockerComposeProgress(0, '0%');
        dockerSetComposeStatus(attachOnly ? 'Suivi Compose en cours...' : 'Lancement Compose...');
        dockerSetButtonRunning(button, true);
        try {
            const response = await fetch('/docker/run_stream?action=' + encodeURIComponent(action), {cache: 'no-store'});
            if (!response.ok) failed = true;
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            while (true) {
                const chunk = await reader.read();
                if (chunk.done) break;
                const text = decoder.decode(chunk.value, {stream: true});
                if (log) {
                    log.textContent += text;
                    log.scrollTop = log.scrollHeight;
                }
                tail += text;
                const lines = tail.split(/\r?\n/);
                tail = lines.pop() || '';
                for (const line of lines) {
                    const progress = dockerParseProgressLine(line);
                    if (progress) {
                        lastProgress = Number(progress.percent || 0);
                        composeFailedCount = Number(progress.failed || 0);
                        const label = progress.total ? `${progress.percent || 0}% · ${progress.current || 0}/${progress.total || 0}` : `${progress.percent || 0}%`;
                        dockerComposeProgress(lastProgress, label, composeFailedCount > 0);
                        if (composeFailedCount > 0) failed = true;
                        continue;
                    }
                    if (dockerLineMeansFailure(line)) failed = true;
                }
            }
            if (tail && dockerLineMeansFailure(tail)) failed = true;
            if (composeFailedCount !== null) failed = composeFailedCount > 0;

            const finalProgress = (!failed && lastProgress < 100) ? 100 : (lastProgress || 100);
            dockerComposeProgress(finalProgress, failed ? 'Erreur' : '100%', failed);

            // Après un pull/start/list Compose, on rafraîchit la zone Docker automatiquement :
            // les nouveaux conteneurs apparaissent sans F5, puis on restaure l'état de la jauge.
            await dockerRefreshContainers(true);
            dockerComposeProgress(finalProgress, failed ? 'Erreur' : '100%', failed);
            dockerShowComposeLogButton(failed);
            dockerSetComposeStatus(failed ? 'Erreur Compose. Clique sur 📜 pour ouvrir le vrai log.' : 'Action Compose terminée correctement.', !failed);
        } catch (error) {
            failed = true;
            if (log) log.textContent += '\nErreur : ' + error;
            dockerComposeProgress(100, 'Erreur', true);
            logButtons.forEach(logButton => {
                logButton.hidden = false;
                logButton.classList.add('is-bad');
            });
            dockerSetComposeStatus('Erreur Compose : ' + (error.message || String(error)), false);
        } finally {
            dockerSetButtonRunning(button, false);
        }
    };

    async function dockerAutoAttachComposeStream() {
        if (!document.querySelector('[data-docker-compose-progress]')) return;
        try {
            const response = await fetch('/docker/run_status', {cache: 'no-store'});
            if (!response.ok) return;
            const data = await response.json().catch(() => null);
            if (!data) return;
            const progress = data.progress || {};
            if (progress && progress.percent !== undefined) {
                const failed = Number(progress.failed || 0) > 0;
                const label = progress.total ? `${progress.percent || 0}% · ${progress.current || 0}/${progress.total || 0}` : `${progress.percent || 0}%`;
                dockerComposeProgress(Number(progress.percent || 0), label, failed);
                dockerShowComposeLogButton(failed);
            }
            if (!data.running) return;
            dockerSetComposeStatus('Suivi Compose en cours...');
            window.dockerRunStream('__attach');
        } catch (error) {}
    }

    window.dockerMoveEnvGroup = function (button, direction) {
        const start = button ? button.closest('tr') : null;
        const body = start ? start.parentElement : null;
        if (!start || !body || !start.classList.contains('docker-env-comment-row')) return;

        const rows = Array.from(body.children);
        const isGroupStart = row => row && row.classList && row.classList.contains('docker-env-comment-row');
        const startIndex = rows.indexOf(start);
        if (startIndex < 0) return;

        let endIndex = startIndex + 1;
        while (endIndex < rows.length && !isGroupStart(rows[endIndex])) endIndex++;

        if (direction < 0) {
            let previousStart = -1;
            for (let i = startIndex - 1; i >= 0; i--) {
                if (isGroupStart(rows[i])) {
                    previousStart = i;
                    break;
                }
            }
            if (previousStart < 0) return;
            const fragment = document.createDocumentFragment();
            rows.slice(startIndex, endIndex).forEach(row => fragment.appendChild(row));
            body.insertBefore(fragment, rows[previousStart]);
            return;
        }

        if (endIndex >= rows.length || !isGroupStart(rows[endIndex])) return;
        let nextEnd = endIndex + 1;
        while (nextEnd < rows.length && !isGroupStart(rows[nextEnd])) nextEnd++;
        const fragment = document.createDocumentFragment();
        rows.slice(endIndex, nextEnd).forEach(row => fragment.appendChild(row));
        body.insertBefore(fragment, start);
    };

        form.dataset.ajaxRunning = '1';
        const submitBtn = form.querySelector('button[type="submit"]');
        const cancelBtn = form.querySelector('button[type="button"]');
        if (submitBtn) submitBtn.disabled = true;
        if (cancelBtn) cancelBtn.disabled = true;
        try {
            const targetUrl = dockerCanonicalActionUrl(form.getAttribute('action'), '/docker/images_docker');
            const res = await fetch(targetUrl, {
                method: 'POST',
                body: new FormData(form),
                headers: {'X-Requested-With': 'XMLHttpRequest'},
                credentials: 'same-origin',
                redirect: 'follow'
            });
            const html = await res.text();
            if (!res.ok) throw new Error('Erreur HTTP ' + res.status);
            const doc = new DOMParser().parseFromString(html, 'text/html');
            dockerCloseImageModals();
            dockerImagesRefreshFromDocument(doc);
            if (!dockerImagesImportFlashes(doc)) dockerImagesFlash('Action Docker terminée.', true);
        } catch (error) {
            dockerImagesFlash('Erreur Ajax Images Docker : ' + error.message, false);
        } finally {
            form.dataset.ajaxRunning = '0';
            if (submitBtn) submitBtn.disabled = false;
            if (cancelBtn) cancelBtn.disabled = false;
        }
    }

        document.querySelectorAll('.keyboard-selected-row').forEach(row => row.classList.remove('keyboard-selected-row'));
        document.querySelectorAll('.keyboard-action-focus').forEach(button => button.classList.remove('keyboard-action-focus'));
        dockerImageKeyboardRow = Math.max(0, Math.min(rowIndex, rows.length - 1));
        const row = rows[dockerImageKeyboardRow];
        row.classList.add('keyboard-selected-row');
        const buttons = dockerImageButtons(row);
        if (buttons.length) {
            dockerImageKeyboardAction = Math.max(0, Math.min(actionIndex, buttons.length - 1));
            const button = buttons[dockerImageKeyboardAction];
            button.classList.add('keyboard-action-focus');
            if (focus) {
                try { button.focus({preventScroll: true}); }
                catch (error) { button.focus(); }
            }
        }
        if (focus) dockerKeepRowVisible(row);
    }

    function dockerBindImageKeyboard() {
        dockerImageRowsList().forEach((row, index) => {
            if (row.dataset.imageKeyboardBound === '1') return;
            row.dataset.imageKeyboardBound = '1';
            row.addEventListener('click', event => {
                const buttons = dockerImageButtons(row);
                const button = event.target.closest('.docker-image-action-btn');
                const actionIndex = button ? Math.max(0, buttons.indexOf(button)) : 0;
                dockerPaintImageKeyboard(index, actionIndex, false);
            });
        });
        dockerPaintImageKeyboard(0, 0, false);
    }

    function dockerHandleImageKeyboard(event) {
        if (!document.querySelector('.docker-page[data-active-tab="images"]')) return;
        if (document.querySelector('.modal-backdrop.active')) return;
        if (event.target?.closest('input, textarea, select, [contenteditable="true"]')) return;
        if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Home', 'End', 'Enter', ' '].includes(event.key)) return;
        const rows = dockerImageRowsList();
        if (!rows.length) return;
        event.preventDefault();
        if (event.key === 'ArrowDown') dockerPaintImageKeyboard(dockerImageKeyboardRow + 1, 0, true);
        else if (event.key === 'ArrowUp') dockerPaintImageKeyboard(dockerImageKeyboardRow - 1, 0, true);
        else if (event.key === 'ArrowRight') dockerPaintImageKeyboard(dockerImageKeyboardRow, dockerImageKeyboardAction + 1, true);
        else if (event.key === 'ArrowLeft') dockerPaintImageKeyboard(dockerImageKeyboardRow, dockerImageKeyboardAction - 1, true);
        else if (event.key === 'Home') dockerPaintImageKeyboard(0, 0, true);
        else if (event.key === 'End') dockerPaintImageKeyboard(rows.length - 1, 0, true);
        else if (event.key === 'Enter' || event.key === ' ') dockerImageButtons(rows[dockerImageKeyboardRow])[dockerImageKeyboardAction]?.click();
    }

    dockerBindImageKeyboard();
    document.addEventListener('keydown', dockerHandleImageKeyboard);

    const dockerLanDefaults = {{ docker_lan_defaults|default({})|tojson }};
    const dockerLanRows = {{ docker_lan_networks|default([])|tojson }};

    function dockerLanSetValue(id, value) {
        const el = document.getElementById(id);
        if (el) el.value = value ?? '';
    }

    window.dockerOpenLanModal = function (row = null) {
        const modal = document.getElementById('docker-lan-modal');
        if (!modal) return;
        const data = row || {
            name: '',
            enabled: true,
            driver: dockerLanDefaults.driver || 'macvlan',
            mode: dockerLanDefaults.mode || 'bridge',
            parent: dockerLanDefaults.parent || '',
            subnet: dockerLanDefaults.subnet || '',
            netmask: dockerLanDefaults.netmask || '255.255.255.0',
            gateway: dockerLanDefaults.gateway || '',
            ip_range: ''
        };
        document.getElementById('docker-lan-modal-title').textContent = row ? 'Modifier le réseau Docker' : 'Ajouter un réseau Docker';
        dockerLanSetValue('lan-old-name', row ? data.name : '');
        dockerLanSetValue('lan-name', data.name || '');
        dockerLanSetValue('lan-enabled', data.enabled === false ? '0' : '1');
        dockerLanSetValue('lan-driver', data.driver || 'macvlan');
        dockerLanSetValue('lan-mode', data.mode || (data.driver === 'ipvlan' ? 'l2' : 'bridge'));
        dockerLanSetValue('lan-parent', data.parent || '');
        dockerLanSetValue('lan-subnet', data.subnet || '');
        dockerLanSetValue('lan-netmask', data.netmask || '');
        dockerLanSetValue('lan-gateway', data.gateway || '');
        dockerLanSetValue('lan-ip-range', data.ip_range || '');
        modal.classList.add('active');
        setTimeout(() => document.getElementById('lan-name')?.focus(), 30);
    };

    window.dockerOpenLanModalByName = function (name) {
        const row = dockerLanRows.find(item => item && item.name === name);
        dockerOpenLanModal(row || {name: name});
    };

    window.dockerCloseLanModal = function () {
        document.getElementById('docker-lan-modal')?.classList.remove('active');
    };

    window.dockerFillLanDefaults = function () {
        dockerLanSetValue('lan-driver', dockerLanDefaults.driver || 'macvlan');
        dockerLanSetValue('lan-mode', dockerLanDefaults.mode || 'bridge');
        dockerLanSetValue('lan-parent', dockerLanDefaults.parent || '');
        dockerLanSetValue('lan-subnet', dockerLanDefaults.subnet || '');
        dockerLanSetValue('lan-netmask', dockerLanDefaults.netmask || '255.255.255.0');
        dockerLanSetValue('lan-gateway', dockerLanDefaults.gateway || '');
    };

    document.getElementById('docker-lan-modal')?.addEventListener('click', event => {
        if (event.target.id === 'docker-lan-modal') dockerCloseLanModal();
    });

    function dockerLanRowsList() {
        return Array.from(document.querySelectorAll('.docker-lan-row'));
    }

    function dockerLanButtons(row) {
        return Array.from(row?.querySelectorAll('.docker-lan-action-btn:not(:disabled)') || []);
    }

    let dockerLanKeyboardRow = 0;
    let dockerLanKeyboardButton = 0;

    function dockerPaintLanKeyboard(rowIndex = dockerLanKeyboardRow, buttonIndex = dockerLanKeyboardButton, focus = true) {
        const rows = dockerLanRowsList();
        if (!rows.length) return;
        document.querySelectorAll('.keyboard-selected-row').forEach(row => row.classList.remove('keyboard-selected-row'));
        document.querySelectorAll('.keyboard-action-focus').forEach(button => button.classList.remove('keyboard-action-focus'));
        dockerLanKeyboardRow = Math.max(0, Math.min(rowIndex, rows.length - 1));
        const row = rows[dockerLanKeyboardRow];
        row.classList.add('keyboard-selected-row');
        const buttons = dockerLanButtons(row);
        if (buttons.length) {
            dockerLanKeyboardButton = Math.max(0, Math.min(buttonIndex, buttons.length - 1));
            const button = buttons[dockerLanKeyboardButton];
            button.classList.add('keyboard-action-focus');
            if (focus) {
                try { button.focus({preventScroll: true}); }
                catch (error) { button.focus(); }
            }
        }
        if (focus) dockerKeepRowVisible(row);
    }

    function dockerBindLanForms() {
        document.querySelectorAll('form[data-lan-confirm]').forEach(form => {
            if (form.dataset.lanConfirmBound === '1') return;
            form.dataset.lanConfirmBound = '1';
            form.addEventListener('submit', event => {
                event.preventDefault();
                dockerPendingLanForm = form;
                dockerPendingAction = null;
                document.getElementById('docker-action-confirm-subtitle').textContent = 'Action réseau Docker';
                document.getElementById('docker-action-confirm-text').textContent = form.dataset.lanConfirm || 'Confirmer cette action réseau ?';
                document.getElementById('docker-action-confirm-modal')?.classList.add('active');
                dockerModalButton = 1;
                setTimeout(() => dockerPaintModalButton(1), 40);
            });
        });

        dockerLanRowsList().forEach((row, index) => {
            if (row.dataset.lanKeyboardBound === '1') return;
            row.dataset.lanKeyboardBound = '1';
            row.addEventListener('click', event => {
                const buttons = dockerLanButtons(row);
                const button = event.target.closest('.docker-lan-action-btn');
                dockerLanKeyboardButton = button ? Math.max(0, buttons.indexOf(button)) : 0;
                dockerPaintLanKeyboard(index, dockerLanKeyboardButton, false);
            });
        });
    }

    function dockerHandleLanKeyboard(event) {
        if (!document.querySelector('.docker-page[data-active-tab="docker_lan"]')) return;
        if (document.querySelector('.modal-backdrop.active')) return;
        if (event.target?.closest('input, textarea, select, [contenteditable="true"]')) return;
        if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Home', 'End', 'Enter', ' '].includes(event.key)) return;
        const rows = dockerLanRowsList();
        if (!rows.length) return;
        event.preventDefault();
        if (event.key === 'ArrowDown') dockerPaintLanKeyboard(dockerLanKeyboardRow + 1, 0, true);
        else if (event.key === 'ArrowUp') dockerPaintLanKeyboard(dockerLanKeyboardRow - 1, 0, true);
        else if (event.key === 'ArrowRight') dockerPaintLanKeyboard(dockerLanKeyboardRow, dockerLanKeyboardButton + 1, true);
        else if (event.key === 'ArrowLeft') dockerPaintLanKeyboard(dockerLanKeyboardRow, dockerLanKeyboardButton - 1, true);
        else if (event.key === 'Home') dockerPaintLanKeyboard(0, 0, true);
        else if (event.key === 'End') dockerPaintLanKeyboard(rows.length - 1, 0, true);
        else if (event.key === 'Enter' || event.key === ' ') dockerLanButtons(rows[dockerLanKeyboardRow])[dockerLanKeyboardButton]?.click();
    }

    dockerBindLanForms();
    dockerPaintLanKeyboard(0, 0, false);
    document.addEventListener('keydown', dockerHandleLanKeyboard);

    {% include "dockers/run_scripts.html" %}

    function dockerAutoHideSuccessFlashes() {
        document.querySelectorAll('.docker-flash-stack .action-message.ok').forEach(message => {
            if (message.dataset.autoHideBound === '1') return;
            message.dataset.autoHideBound = '1';
            window.setTimeout(() => {
                message.classList.add('docker-flash-hiding');
                window.setTimeout(() => {
                    message.remove();
                    document.querySelectorAll('.docker-flash-stack').forEach(stack => {
                        if (!stack.querySelector('.action-message')) stack.remove();
                    });
                }, 260);
            }, 10000);
        });
    }

    dockerAutoHideSuccessFlashes();
})();
</script>
